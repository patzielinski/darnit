name: Publish to PyPI

# NOTE: This workflow is a placeholder and not yet active.
# To enable: uncomment the release trigger below and configure
# PyPI Trusted Publishing at https://pypi.org/manage/account/publishing/

on:
  workflow_dispatch:  # Manual trigger only for now
  # release:
  #   types: [published]

# Restrict permissions to minimum required at workflow level
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.0"

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build packages
        run: |
          uv build --package darnit
          uv build --package darnit-baseline

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: dist
          path: dist/

  publish-darnit:
    name: Publish darnit
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing and Sigstore signing
      contents: read
      attestations: write  # Required for Sigstore attestations

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: dist
          path: dist/

      - name: Publish darnit to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          attestations: true  # Sign with Sigstore

  publish-darnit-baseline:
    name: Publish darnit-baseline
    needs: publish-darnit
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing and Sigstore signing
      contents: read
      attestations: write  # Required for Sigstore attestations

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: dist
          path: dist/

      - name: Publish darnit-baseline to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          attestations: true  # Sign with Sigstore
