name: Publish to PyPI

# NOTE: This workflow is a placeholder and not yet active.
# To enable: uncomment the release trigger below and configure
# PyPI Trusted Publishing at https://pypi.org/manage/account/publishing/

on:
  workflow_dispatch:  # Manual trigger only for now
  # release:
  #   types: [published]

# Restrict permissions to minimum required at workflow level
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.0"

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build packages
        run: |
          uv build --package darnit
          uv build --package darnit-baseline

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish-darnit:
    name: Publish darnit
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing and Sigstore signing
      contents: read
      attestations: write  # Required for Sigstore attestations

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: dist
          path: dist/

      - name: Publish darnit to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          attestations: true  # Sign with Sigstore

  publish-darnit-baseline:
    name: Publish darnit-baseline
    needs: publish-darnit
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing and Sigstore signing
      contents: read
      attestations: write  # Required for Sigstore attestations

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: dist
          path: dist/

      - name: Publish darnit-baseline to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          attestations: true  # Sign with Sigstore
