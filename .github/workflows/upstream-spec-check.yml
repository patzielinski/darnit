name: Upstream Spec Check

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-dot-project-spec:
    name: Check .project/ Spec Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check upstream .project/ spec
        run: |
          uv run pytest tests/darnit/context/test_dot_project_upstream.py -v -m upstream

      - name: Create issue if spec changed
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-spec-change',
              state: 'open'
            });

            if (issues.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }

            // Create new issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Upstream CNCF .project/ specification has changed',
              body: `The nightly upstream spec check has detected changes to the CNCF .project/ specification.

            ## Action Required

            1. Review the upstream changes:
               - [types.go](https://github.com/cncf/automation/blob/main/utilities/dot-project/types.go)
               - [Open PRs](https://github.com/cncf/automation/pulls)

            2. Update our implementation in \`packages/darnit/src/darnit/context/dot_project.py\`

            3. Update the tracked hash:
               \`\`\`bash
               uv run pytest tests/darnit/context/test_dot_project_upstream.py -v --update-hash
               \`\`\`

            4. Update \`DOT_PROJECT_SPEC_VERSION\` if the spec version changed

            ## References

            - Our implementation: \`packages/darnit/src/darnit/context/dot_project.py\`
            - Tests: \`tests/darnit/context/test_dot_project_upstream.py\`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            `,
              labels: ['upstream-spec-change', 'maintenance']
            });
