[project]
name = "darnit"
version = "0.1.0"
description = "Generic compliance audit framework with plugin architecture"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.23.0",  # CVE-2025-66416 DNS rebinding fix
    "pydantic>=2.0.0",
    "pyyaml>=6.0.0",
    "pydantic[email]>=2.0.0",
    "tomli>=2.0.0;python_version<'3.11'",
    "tomllib-stubs>=0.1.0;python_version<'3.11'",
]

[project.scripts]
darnit = "darnit.cli:main"

[project.entry-points."darnit.frameworks"]
# Framework plugins register here
# Example: openssf-baseline = "darnit_baseline:get_framework_path"

[project.optional-dependencies]
attestation = [
    "sigstore>=3.0.0",
    "in-toto-attestation>=0.9.0",
    "urllib3>=2.6.3",  # CVE-2025-66471, CVE-2026-21441, CVE-2025-66418 fixes
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/darnit"]
