        with:
          subject-path: '.'
"""

# --- Policy Document Templates ---

[templates.support_scope_template]
description = "Support scope section with supported versions and duration"
content = """# Support Scope

## Supported Versions

| Version | Status | End of Support |
|---------|--------|----------------|
| latest  | Active | N/A            |

## Support Duration

- **Active support**: Bug fixes and security patches for the latest release
- **Security-only**: Critical security patches only for previous releases
- **End of life**: No further updates

## What Is Supported

- Bug reports for supported versions
- Security vulnerability reports (see [SECURITY.md](SECURITY.md))
- Feature requests via GitHub Issues

## What Is Not Supported

- Custom deployments or forks
- Versions that have reached end of life
"""

[templates.end_of_support_template]
description = "End-of-support policy with notification and migration guidance"
content = """# End of Support Policy

## Notification Process

When a version approaches end of support:
1. A deprecation notice will be added to the README and release notes
2. An issue will be created tracking the end-of-support timeline
3. A minimum of **30 days notice** will be given before support ends

## Migration Guidance

When upgrading to a new supported version:
- Review the CHANGELOG for breaking changes
- Follow the migration guide (if provided in the release notes)
- Test thoroughly in a non-production environment first

## After End of Support

- The version's code remains available but will not receive updates
- Issues filed against unsupported versions may be closed
- Users are encouraged to upgrade to a supported version
"""

[templates.dependency_management_template]
description = "Dependency management policy, update cadence, and vulnerability response"
content = """# Dependency Management

## Policy

$REPO manages dependencies with the following principles:
- Dependencies are kept to a minimum
- All dependencies must have compatible licenses
- Dependencies are regularly updated

## Update Cadence

- **Security patches**: Applied as soon as possible (within 48 hours for critical)
- **Minor updates**: Reviewed and applied monthly
- **Major updates**: Evaluated for compatibility and applied quarterly

## Vulnerability Response

When a vulnerability is discovered in a dependency:
1. Assess the impact on this project
2. Apply the fix or upgrade within the timeframe based on severity:
   - **Critical**: 48 hours
   - **High**: 7 days
   - **Medium**: 30 days
   - **Low**: Next scheduled update
3. If no fix is available, evaluate workarounds or alternative dependencies

## Tools

- Dependabot or Renovate for automated dependency updates
- `gh api /repos/$OWNER/$REPO/dependabot/alerts` for vulnerability monitoring
"""

[templates.sca_policy_template]
description = "SCA policy with scanning frequency, severity thresholds, and remediation timelines"
content = """# Software Composition Analysis (SCA) Policy

## Scanning Frequency

- **Every pull request**: Automated dependency review before merge
- **Daily**: Automated vulnerability scanning of all dependencies
- **On release**: Full dependency audit before each release

## Severity Thresholds

| Severity | Action Required | Timeline |
|----------|----------------|----------|
| Critical | Block merge, immediate fix | 48 hours |
| High     | Block merge, prioritize fix | 7 days |
| Medium   | Warning, schedule fix | 30 days |
| Low      | Informational, fix in next cycle | 90 days |

## Remediation Process

1. Automated alerts from dependency scanning tools
2. Triage by maintainers to confirm applicability
3. Apply patch, upgrade, or document as not affected (VEX)
4. Verify fix does not introduce regressions

## Exceptions

Exceptions to the remediation timelines require:
- Documented justification
- Approval from a project maintainer
- A tracking issue with a planned resolution date
"""

[templates.sast_policy_template]
description = "SAST policy with scanning triggers, severity handling, and exception process"
content = """# Static Application Security Testing (SAST) Policy

## Scanning Triggers

- **Every push to main**: Full SAST scan
- **Every pull request**: Incremental SAST scan
- **Weekly schedule**: Comprehensive scan with updated rules

## Severity Handling

| Severity | Action | Timeline |
|----------|--------|----------|
| Critical/High | Block merge until resolved | Before merge |
| Medium | Must be resolved or documented | 30 days |
| Low | Informational, resolve when convenient | 90 days |

## Supported Tools

This project uses automated SAST scanning in CI/CD. Results are reported
as GitHub code scanning alerts.

## Exception Process

To request an exception for a SAST finding:
1. Create an issue documenting the finding and why it is not applicable
2. Get approval from a project maintainer
3. Add a suppression comment in the code with a reference to the issue
4. Review exceptions quarterly to ensure they are still valid
"""

# =============================================================================
# Context Definitions (Interactive Context Collection)
# =============================================================================
# These define context keys that can be collected from users to improve audit
# accuracy. Each key specifies its type, prompt, and which controls it affects.
#
# Note: The CNCF .project/ specification is still under development (PR #131).
# Context storage format may change as the upstream spec evolves.

[context.maintainers]
type = "list_or_path"
prompt = "Who are the project maintainers?"
hint = "Provide GitHub usernames (e.g., @user1, @user2) or path to MAINTAINERS.md"
examples = ["@user1, @user2", "MAINTAINERS.md"]
affects = ["OSPS-GV-01.01", "OSPS-GV-01.02", "OSPS-GV-04.01"]
store_as = "governance.maintainers"
auto_detect = true  # Auto-detect from git/GitHub, present for user confirmation
auto_detect_method = "github_collaborators"  # Used for sieve hints when allow_sieve_hints=true
required = false
# Authoritative files to check - if found, suggest referencing the file instead of values
hint_sources = ["CODEOWNERS", ".github/CODEOWNERS", "MAINTAINERS.md", "MAINTAINERS"]
# Show sieve results (git history, manifests, API) as hints when no authoritative file exists
allow_sieve_hints = true

[context.security_contact]
type = "string"
prompt = "What is the security contact for vulnerability reports?"
hint = "Email address, URL, or reference to SECURITY.md section"
examples = ["security@example.com", "https://example.com/security", "See SECURITY.md"]
affects = ["OSPS-VM-01.01", "OSPS-VM-02.01", "OSPS-VM-03.01"]
store_as = "security.contact"
auto_detect = false
required = false

[context.governance_model]
type = "enum"
prompt = "What governance model does this project use?"
hint = "Select the model that best describes how decisions are made"
values = ["bdfl", "meritocracy", "democracy", "corporate", "foundation", "committee", "other"]
examples = ["bdfl", "foundation"]
affects = ["OSPS-GV-01.01", "OSPS-GV-01.02"]
store_as = "governance.model"
auto_detect = false
required = false

[context.has_subprojects]
type = "boolean"
prompt = "Does this project have subprojects or related repositories?"
hint = "Set to false if this is a standalone project"
examples = ["true", "false"]
affects = ["OSPS-GV-01.02"]
store_as = "project.has_subprojects"
auto_detect = false
required = false

[context.has_releases]
type = "boolean"
prompt = "Does this project make official releases?"
hint = "Set to true if you publish versioned releases"
examples = ["true", "false"]
affects = ["OSPS-BR-02.01", "OSPS-BR-03.01", "OSPS-BR-04.01"]
store_as = "build.has_releases"
auto_detect = true
required = false
detect = [
    { handler = "exec", command = ["gh", "release", "list", "--repo", "$OWNER/$REPO", "--limit", "1"], pass_exit_codes = [0], value_if_pass = true, value_if_fail = false },
]

[context.is_library]
type = "boolean"
prompt = "Is this a library or framework consumed by other projects?"
hint = "Set to true if other projects depend on this as a dependency"
examples = ["true", "false"]
affects = ["OSPS-DO-04.01", "OSPS-BR-01.01"]
store_as = "project.is_library"
auto_detect = false
required = false

[context.has_compiled_assets]
type = "boolean"
prompt = "Does this project release compiled binaries or build artifacts?"
hint = "Set to true if you release binaries, containers, or other compiled assets"
examples = ["true", "false"]
affects = ["OSPS-BR-03.01", "OSPS-BR-04.01"]
store_as = "build.has_compiled_assets"
auto_detect = false
required = false

[context.ci_provider]
type = "enum"
prompt = "What CI/CD system does this project use?"
hint = "Select your primary CI/CD provider"
values = ["github", "gitlab", "jenkins", "circleci", "azure", "travis", "none", "other"]
examples = ["github", "gitlab"]
affects = ["OSPS-QA-03.01", "OSPS-QA-04.01"]
store_as = "ci.provider"
auto_detect = true
required = false
detect = [
    { handler = "file_exists", files = [".github/workflows"], value_if_pass = "github" },
    { handler = "file_exists", files = [".gitlab-ci.yml"], value_if_pass = "gitlab" },
    { handler = "file_exists", files = ["Jenkinsfile"], value_if_pass = "jenkins" },
    { handler = "file_exists", files = [".circleci/config.yml"], value_if_pass = "circleci" },
    { handler = "file_exists", files = ["azure-pipelines.yml"], value_if_pass = "azure" },
    { handler = "file_exists", files = [".travis.yml"], value_if_pass = "travis" },
]

# =============================================================================
# Shared Handlers (cached across controls within a single audit run)
# =============================================================================

[shared_handlers.branch_protection_api]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO/branches/$BRANCH/protection"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
timeout = 30

[shared_handlers.repo_info_api]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO"]
pass_exit_codes = [0]
output_format = "json"
timeout = 30

[shared_handlers.release_list_api]
handler = "exec"
command = ["gh", "release", "list", "--repo", "$OWNER/$REPO", "--json", "tagName,isLatest,publishedAt", "--limit", "5"]
pass_exit_codes = [0]
output_format = "json"
timeout = 30

# =============================================================================
