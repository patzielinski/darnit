# =============================================================================
# Level 3 Controls - Access Control (AC)
# =============================================================================

[controls."OSPS-AC-04.02"]
name = "ScopedPermissions"
description = "Workflow permissions are appropriately scoped"
tags = { level = 3, domain = "AC", security_severity = 7.0, access-control = true, ci-cd = true, least-privilege = true }
when = { ci_provider = "github" }
depends_on = ["OSPS-AC-04.01"]  # Scoped permissions builds on explicit permissions

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-AC-04.02"
location_hint = ".github/workflows"
help_md = """Minimize CI/CD job permissions.

**Remediation:**
1. Audit each job's actual permission needs
2. Remove unnecessary permissions
3. Use job-level instead of workflow-level permissions
4. Avoid using `write-all` or `admin` permissions
"""

[[controls."OSPS-AC-04.02".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]
pass_if_any = false

[controls."OSPS-AC-04.02".passes.pattern.patterns]
scoped_permission = '^\s+(contents|issues|pull-requests|packages|actions|security-events|id-token|attestations|deployments|statuses|checks):\s*(read|write|none)'

[[controls."OSPS-AC-04.02".passes]]
handler = "manual"
steps = [
    "Review workflow permissions in .github/workflows/",
    "Verify permissions are scoped to specific resources (contents, issues, etc.)",
    "Confirm read-only access is used where write access isn't needed",
]

[controls."OSPS-AC-04.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-AC-04.02".remediation.handlers]]
handler = "manual"
steps = [
    "Review each workflow and replace broad permissions with scoped ones",
    "Use 'contents: read' instead of 'contents: write' where only reading is needed",
    "Scope permissions at the job level rather than the workflow level when jobs have different needs",
]
docs_url = "https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs"
context_hints = ["ci.provider"]

