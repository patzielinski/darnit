[templates.support_scope_template]
description = "Support scope section with supported versions and duration"
content = """# Support Scope

## Supported Versions

| Version | Status | End of Support |
|---------|--------|----------------|
| latest  | Active | N/A            |

## Support Duration

- **Active support**: Bug fixes and security patches for the latest release
- **Security-only**: Critical security patches only for previous releases
- **End of life**: No further updates

## What Is Supported

- Bug reports for supported versions
- Security vulnerability reports (see [SECURITY.md](SECURITY.md))
- Feature requests via GitHub Issues

## What Is Not Supported

- Custom deployments or forks
- Versions that have reached end of life
"""

[templates.end_of_support_template]
description = "End-of-support policy with notification and migration guidance"
content = """# End of Support Policy

## Notification Process

When a version approaches end of support:
1. A deprecation notice will be added to the README and release notes
2. An issue will be created tracking the end-of-support timeline
3. A minimum of **30 days notice** will be given before support ends

## Migration Guidance

When upgrading to a new supported version:
- Review the CHANGELOG for breaking changes
- Follow the migration guide (if provided in the release notes)
- Test thoroughly in a non-production environment first

## After End of Support

- The version's code remains available but will not receive updates
- Issues filed against unsupported versions may be closed
- Users are encouraged to upgrade to a supported version
"""

[templates.dependency_management_template]
description = "Dependency management policy, update cadence, and vulnerability response"
content = """# Dependency Management

## Policy

$REPO manages dependencies with the following principles:
- Dependencies are kept to a minimum
- All dependencies must have compatible licenses
- Dependencies are regularly updated

## Update Cadence

- **Security patches**: Applied as soon as possible (within 48 hours for critical)
- **Minor updates**: Reviewed and applied monthly
- **Major updates**: Evaluated for compatibility and applied quarterly

## Vulnerability Response

When a vulnerability is discovered in a dependency:
1. Assess the impact on this project
2. Apply the fix or upgrade within the timeframe based on severity:
   - **Critical**: 48 hours
   - **High**: 7 days
   - **Medium**: 30 days
   - **Low**: Next scheduled update
3. If no fix is available, evaluate workarounds or alternative dependencies

## Tools

- Dependabot or Renovate for automated dependency updates
- `gh api /repos/$OWNER/$REPO/dependabot/alerts` for vulnerability monitoring
"""

[templates.sca_policy_template]
description = "SCA policy with scanning frequency, severity thresholds, and remediation timelines"
content = """# Software Composition Analysis (SCA) Policy

## Scanning Frequency

- **Every pull request**: Automated dependency review before merge
- **Daily**: Automated vulnerability scanning of all dependencies
- **On release**: Full dependency audit before each release

## Severity Thresholds

| Severity | Action Required | Timeline |
|----------|----------------|----------|
| Critical | Block merge, immediate fix | 48 hours |
| High     | Block merge, prioritize fix | 7 days |
| Medium   | Warning, schedule fix | 30 days |
| Low      | Informational, fix in next cycle | 90 days |

## Remediation Process

1. Automated alerts from dependency scanning tools
2. Triage by maintainers to confirm applicability
3. Apply patch, upgrade, or document as not affected (VEX)
4. Verify fix does not introduce regressions

## Exceptions

Exceptions to the remediation timelines require:
- Documented justification
- Approval from a project maintainer
- A tracking issue with a planned resolution date
"""

[templates.sast_policy_template]
description = "SAST policy with scanning triggers, severity handling, and exception process"
content = """# Static Application Security Testing (SAST) Policy

## Scanning Triggers

- **Every push to main**: Full SAST scan
- **Every pull request**: Incremental SAST scan
- **Weekly schedule**: Comprehensive scan with updated rules

## Severity Handling

| Severity | Action | Timeline |
|----------|--------|----------|
| Critical/High | Block merge until resolved | Before merge |
| Medium | Must be resolved or documented | 30 days |
| Low | Informational, resolve when convenient | 90 days |

## Supported Tools

This project uses automated SAST scanning in CI/CD. Results are reported
as GitHub code scanning alerts.

## Exception Process

To request an exception for a SAST finding:
1. Create an issue documenting the finding and why it is not applicable
2. Get approval from a project maintainer
3. Add a suppression comment in the code with a reference to the issue
4. Review exceptions quarterly to ensure they are still valid
"""

[templates.security_assessment_template]
description = "Security assessment process documentation"
content = """# Security Assessment Process

## Pre-Release Security Review

Before each major release, the following security assessment steps are performed:

### Security Audit Checklist

- [ ] Review all dependencies for known vulnerabilities
- [ ] Run static analysis security testing (SAST) tools
- [ ] Check for hardcoded credentials or secrets
- [ ] Review access control and authentication changes
- [ ] Verify input validation on new endpoints or user inputs

### Security Review Process

1. A security review issue is created for each major release
2. At least one maintainer reviews security-relevant changes
3. All critical and high severity findings must be resolved before release
4. Security review sign-off is documented in the release notes
"""

[templates.architecture_template]
description = "Architecture documentation template with example structure"
content = """# Architecture

## Overview

This document describes the architecture and design of $REPO, including its major components, the actors that interact with it, and how data flows through the system.

## Components

| Component | Responsibility | Key Files |
|-----------|---------------|-----------|
| Core Engine | Main processing logic and orchestration | `src/core/` |
| Configuration | Loading and validating configuration | `src/config/` |
| API Layer | External interface (CLI, HTTP, or library API) | `src/api/` |
| Storage | Data persistence and retrieval | `src/storage/` |

Update this table to reflect the actual components in your project.

## Actors

| Actor | Description | Interactions |
|-------|-------------|-------------|
| End User | Primary user of the software | Sends requests via CLI/API, receives results |
| Administrator | Manages configuration and deployment | Configures system, manages access |
| CI/CD System | Automated build and deployment pipeline | Triggers builds, runs tests, deploys |
| External Services | Third-party APIs or dependencies | Provides data or services consumed by the system |

## Data Flow

```
End User → API Layer → Core Engine → Storage
                ↓
         Configuration
                ↓
         External Services
```

1. **Input**: User submits a request through the API layer (CLI, HTTP, or library call)
2. **Validation**: The API layer validates input parameters and authentication
3. **Processing**: The core engine processes the request using configured rules
4. **Storage**: Results are persisted to the storage layer
5. **Response**: Processed results are returned to the user

## Security Boundaries

- **External boundary**: All user input is validated at the API layer
- **Internal boundary**: Storage access is mediated through the core engine
- **Trust boundary**: External service calls use authenticated connections
"""

