# =============================================================================
# Level 1 Controls - Build & Release (BR)
# =============================================================================

[controls."OSPS-BR-01.01"]
name = "SecureWorkflowInputs"
description = "Workflows handle untrusted inputs safely"
tags = { level = 1, domain = "BR", security_severity = 8.5, build = true, security = true, ci-cd = true }
when = { ci_provider = "github" }
help_md = """Sanitize all CI/CD input parameters to prevent injection attacks.

**Remediation:**
1. Review workflow files for input usage
2. Use intermediate environment variables instead of direct interpolation
3. Validate inputs before use in shell commands

**Example:**
```yaml
env:
  INPUT_VALUE: ${{ inputs.value }}
run: |
  # Validate before use
  if [[ "$INPUT_VALUE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
    echo "Valid input: $INPUT_VALUE"
  fi
```
"""

# Primary: Run zizmor static analysis for template injection
[[controls."OSPS-BR-01.01".passes]]
handler = "exec"
command = ["zizmor", "--format", "json", "--offline", "$PATH"]
output_format = "json"
expr = '!output.json.exists(f, f.ident == "template-injection")'
timeout = 60

# Fallback: regex scan for common injection patterns (if zizmor not installed)
[[controls."OSPS-BR-01.01".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]
pass_if_any = false

[controls."OSPS-BR-01.01".passes.pattern.patterns]
injection_risk = "\\$\\{\\{\\s*github\\.(event\\.issue|event\\.pull_request|head_ref)"

[[controls."OSPS-BR-01.01".passes]]
handler = "manual"
steps = [
    "Review GitHub workflow files in .github/workflows/",
    "Check that untrusted inputs are not used in run: blocks directly",
    "Verify ${{ github.event.* }} expressions are properly sanitized",
]

[controls."OSPS-BR-01.01".remediation]
safe = false
dry_run_supported = false

# Primary: zizmor auto-fix moves ${{ }} into env: variables (uses --fix=all which
# includes "unsafe" fixes that may change workflow behavior)
[[controls."OSPS-BR-01.01".remediation.handlers]]
handler = "exec"
command = ["zizmor", "--fix=all", "--offline", "$PATH"]
pass_exit_codes = [0, 11, 12, 13, 14]
timeout = 60

# Fallback: manual remediation steps
[[controls."OSPS-BR-01.01".remediation.handlers]]
handler = "manual"
steps = [
    "Audit all .github/workflows/*.yml files for ${{ github.event.* }} usage in run: blocks",
    "Replace direct interpolation with environment variables: env: MY_VAR: ${{ github.event.issue.title }}",
    "Use actions/github-script for complex event data handling",
]
docs_url = "https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections"
context_hints = ["ci.provider"]

[controls."OSPS-BR-01.02"]
name = "SecureBranchNames"
description = "Branch names are handled safely in workflows"
tags = { level = 1, domain = "BR", build = true, security = true }
when = { ci_provider = "github" }

# Pattern: Check workflows don't use raw branch names unsafely
[[controls."OSPS-BR-01.02".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]

[controls."OSPS-BR-01.02".passes.pattern.patterns]
# Look for safe patterns - quoting or using github.ref_name
safe_ref_usage = "(\\$\\{\\{ github\\.ref_name \\}\\}|\\$\\{\\{ github\\.head_ref \\}\\})"

[[controls."OSPS-BR-01.02".passes]]
handler = "manual"
steps = [
    "Review CI/CD workflows for branch name handling",
    "Verify branch names are not used in shell commands without sanitization",
    "Check for proper quoting and escaping of branch name variables",
]

[controls."OSPS-BR-01.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-BR-01.02".remediation.handlers]]
handler = "manual"
steps = [
    "Review CI/CD workflows for direct use of branch names in shell commands",
    "Ensure branch name references are quoted: \"$GITHUB_REF_NAME\" not $GITHUB_REF_NAME",
    "Consider using actions/checkout with ref parameter instead of manual branch handling",
]
docs_url = "https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions"
context_hints = ["ci.provider"]

[controls."OSPS-BR-03.01"]
name = "SecureRepositoryURL"
description = "Repository URL uses HTTPS"
tags = { level = 1, domain = "BR", build = true, security = true }
