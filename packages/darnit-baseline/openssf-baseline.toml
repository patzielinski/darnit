[controls."OSPS-QA-02.01".passes]
deterministic = { file_must_exist = [
    "package.json",
    "requirements.txt",
    "pyproject.toml",
    "Cargo.toml",
    "go.mod",
    "pom.xml",
    "build.gradle",
