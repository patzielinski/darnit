# =============================================================================
# Level 2 Controls - Vulnerability Management (VM)
# =============================================================================

[controls."OSPS-VM-01.01"]
name = "DisclosurePolicy"
description = "Security policy includes disclosure process"
tags = { level = 2, domain = "VM", security = true, vulnerability-management = true }
depends_on = ["OSPS-VM-02.01"]  # Needs SECURITY.md to exist first

[controls."OSPS-VM-01.01".locator]
project_path = "security.policy"
discover = ["SECURITY.md", ".github/SECURITY.md", "docs/SECURITY.md"]
kind = "file"

[controls."OSPS-VM-01.01".locator.llm_hints]
search_for = "disclosure policy, vulnerability disclosure, responsible disclosure"
check_files = ["README.md"]
look_for_urls = true

[[controls."OSPS-VM-01.01".passes]]
handler = "pattern"
files = ["SECURITY.md"]

[controls."OSPS-VM-01.01".passes.pattern.patterns]
disclosure = "(disclos|report|contact)"
process = "(process|procedure|timeline)"

[[controls."OSPS-VM-01.01".passes]]
handler = "manual"
steps = [
    "Check SECURITY.md for disclosure policy section",
    "Verify process for reporting vulnerabilities is documented",
    "Confirm expected timeline for acknowledgment/response is provided",
]

[controls."OSPS-VM-01.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-VM-01.01".remediation.handlers]]
handler = "manual"
steps = [
    "Add a 'Disclosure Policy' section to SECURITY.md",
    "Document the process for reporting vulnerabilities (email, GitHub Security Advisories, etc.)",
    "Specify expected response timeline (e.g., 'We will acknowledge within 48 hours')",
    "Include information about coordinated disclosure timeline (e.g., 90 days)",
]
docs_url = "https://docs.github.com/en/code-security/security-advisories/guidance-on-reporting-and-writing-information-about-vulnerabilities/about-coordinated-disclosure-of-security-vulnerabilities"

[controls."OSPS-VM-03.01"]
name = "PrivateReporting"
description = "Private vulnerability reporting is enabled"
tags = { level = 2, domain = "VM", security = true, vulnerability-management = true }
when = { platform = "github" }

[controls."OSPS-VM-03.01".locator]
project_path = "security.policy"
discover = ["SECURITY.md", ".github/SECURITY.md"]
kind = "file"

[controls."OSPS-VM-03.01".locator.llm_hints]
search_for = "private reporting, security email, PGP key, confidential"
check_files = ["README.md"]
look_for_urls = false

# ExecPass: Check if GitHub private vulnerability reporting is enabled
[[controls."OSPS-VM-03.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO/private-vulnerability-reporting"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
expr = 'has(output.json.enabled) && output.json.enabled == true'
timeout = 30

# PatternPass: Check for private contact methods in SECURITY.md
[[controls."OSPS-VM-03.01".passes]]
handler = "pattern"
files = ["SECURITY.md", ".github/SECURITY.md"]

[controls."OSPS-VM-03.01".passes.pattern.patterns]
private_contact = "(private|confidential|security advisory|PGP|GPG|security@|email)"

[[controls."OSPS-VM-03.01".passes]]
handler = "manual"
steps = [
    "Verify SECURITY.md contains a private reporting mechanism",
    "Check for security email address or PGP key",
    "Confirm GitHub Security Advisories is enabled in Settings → Security",
]

[controls."OSPS-VM-03.01".remediation]
safe = true
requires_api = true
dry_run_supported = false

[[controls."OSPS-VM-03.01".remediation.handlers]]
handler = "api_call"
method = "PUT"
endpoint = "/repos/$OWNER/$REPO/private-vulnerability-reporting"
payload_template = "vulnerability_reporting_payload"

[[controls."OSPS-VM-03.01".remediation.handlers]]
handler = "manual"
steps = [
    "Enable GitHub Security Advisories: Settings → Security → 'Private vulnerability reporting'",
    "Add a security contact email to SECURITY.md (e.g., security@yourproject.org)",
    "Optionally provide a PGP/GPG key for encrypted communications",
    "Document the private reporting mechanism clearly in SECURITY.md",
]
docs_url = "https://docs.github.com/en/code-security/security-advisories/working-with-repository-security-advisories/configuring-private-vulnerability-reporting-for-a-repository"

[controls."OSPS-VM-04.01"]
name = "SecurityAdvisories"
description = "Repository supports security advisories"
tags = { level = 2, domain = "VM", security = true, vulnerability-management = true }
when = { platform = "github" }

# ExecPass: Check if security advisories are supported (requires Issues enabled)
[[controls."OSPS-VM-04.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO", "--jq", ".has_issues"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "text"
expr = 'output.stdout.startsWith("true")'
timeout = 30

[[controls."OSPS-VM-04.01".passes]]
handler = "manual"
steps = [
    "Navigate to Repository Settings → General → Features",
    "Verify 'Issues' is enabled (required for Security Advisories)",
    "Check Security tab for advisory capability",
]

[controls."OSPS-VM-04.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-VM-04.01".remediation.handlers]]
handler = "manual"
steps = [
    "Navigate to Repository Settings → General → Features",
    "Enable 'Issues' if not already enabled (required for Security Advisories)",
    "Navigate to Settings → Security → 'Private vulnerability reporting' and enable it",
    "Verify the Security tab shows advisory creation capability",
]
docs_url = "https://docs.github.com/en/code-security/security-advisories/working-with-repository-security-advisories/about-repository-security-advisories"

# =============================================================================
# Level 3 Controls - Access Control (AC)
# =============================================================================

[controls."OSPS-AC-04.02"]
name = "ScopedPermissions"
description = "Workflow permissions are appropriately scoped"
tags = { level = 3, domain = "AC", security_severity = 7.0, access-control = true, ci-cd = true, least-privilege = true }
when = { ci_provider = "github" }
depends_on = ["OSPS-AC-04.01"]  # Scoped permissions builds on explicit permissions

[[controls."OSPS-AC-04.02".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]

[controls."OSPS-AC-04.02".passes.pattern.patterns]
scoped = "(contents:|issues:|pull-requests:|packages:)"
read_only = "read(-only)?"

[[controls."OSPS-AC-04.02".passes]]
handler = "manual"
steps = [
    "Review workflow permissions in .github/workflows/",
    "Verify permissions are scoped to specific resources (contents, issues, etc.)",
    "Confirm read-only access is used where write access isn't needed",
]

[controls."OSPS-AC-04.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-AC-04.02".remediation.handlers]]
handler = "manual"
steps = [
    "Review each workflow and replace broad permissions with scoped ones",
    "Use 'contents: read' instead of 'contents: write' where only reading is needed",
    "Scope permissions at the job level rather than the workflow level when jobs have different needs",
]
docs_url = "https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs"
context_hints = ["ci.provider"]

# =============================================================================
# Level 3 Controls - Build & Release (BR)
# =============================================================================

[controls."OSPS-BR-02.02"]
name = "ClearAssetAssociation"
description = "Clearly associate all release assets with release identifiers"
tags = { level = 3, domain = "BR", build = true, releases = true }
when = { platform = "github" }

# ExecPass: Check that releases have assets associated with tags
[[controls."OSPS-BR-02.02".passes]]
handler = "exec"
command = ["gh", "release", "list", "--json", "tagName,assets", "--limit", "5"]
pass_exit_codes = [0]
output_format = "json"
expr = 'size(output.json) > 0 && size(output.json[0].assets) > 0'
timeout = 30

[[controls."OSPS-BR-02.02".passes]]
handler = "manual"
steps = [
    "Verify release assets are clearly associated with specific release versions",
    "Check that asset filenames or metadata include version identifiers",
    "Confirm release notes link assets to the correct release",
]

[controls."OSPS-BR-02.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-BR-02.02".remediation.handlers]]
handler = "manual"
steps = [
    "Include version identifiers in release asset filenames (e.g., myapp-v1.2.3.tar.gz)",
    "Use 'gh release upload' to associate assets with specific releases",
    "Document asset-to-version mapping in release notes",
]
context_hints = ["build.has_releases", "build.has_compiled_assets"]

[controls."OSPS-BR-07.02"]
name = "SecretsManagementPolicy"
description = "Define policy for managing secrets and credentials"
tags = { level = 3, domain = "BR", build = true, secrets = true, security = true }

[[controls."OSPS-BR-07.02".passes]]
handler = "pattern"
files = ["SECURITY.md", "docs/security.md", "CONTRIBUTING.md"]

[controls."OSPS-BR-07.02".passes.pattern.patterns]
secrets_policy = "(secret|credential|token|key).*(management|policy|handling|rotation)"

[[controls."OSPS-BR-07.02".passes]]
handler = "manual"
steps = [
    "Verify documentation describes secrets management policy",
    "Check that credential rotation practices are defined",
    "Confirm guidance for handling sensitive values is documented",
]

[controls."OSPS-BR-07.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-BR-07.02".remediation.handlers]]
handler = "manual"
steps = [
    "Document your secrets management policy (e.g., in SECURITY.md or a dedicated doc)",
    "Define credential rotation schedules and procedures",
    "Use GitHub Actions secrets or a vault service for CI/CD credentials",
    "Never store secrets in code or configuration files committed to version control",
]
docs_url = "https://docs.github.com/en/actions/security-guides/using-secrets-in-github-actions"

# =============================================================================
# Level 3 Controls - Quality Assurance (QA)
# =============================================================================

[controls."OSPS-QA-02.02"]
name = "SoftwareBillOfMaterials"
description = "Deliver compiled assets with Software Bill of Materials (SBOM)"
tags = { level = 3, domain = "QA", quality = true, releases = true, supply-chain = true }
when = { has_compiled_assets = true }

[[controls."OSPS-QA-02.02".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]

[controls."OSPS-QA-02.02".passes.pattern.patterns]
sbom_generation = "(sbom|syft|cyclonedx|spdx|anchore)"

[[controls."OSPS-QA-02.02".passes]]
handler = "manual"
steps = [
    "Verify SBOM is generated for compiled/released assets",
    "Check for SBOM generation tools in CI/CD (Syft, CycloneDX, etc.)",
    "Confirm SBOM is published alongside release artifacts",
]

[controls."OSPS-QA-02.02".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-QA-02.02".remediation.handlers]]
handler = "file_create"
path = ".github/workflows/sbom.yml"
template = "sbom_workflow"
overwrite = false
create_dirs = true

[[controls."OSPS-QA-02.02".remediation.handlers]]
handler = "manual"
steps = [
    "Choose an SBOM generation tool: Syft (recommended), CycloneDX, or SPDX tools",
    "Add SBOM generation step to your release workflow: 'syft packages dir:. -o spdx-json > sbom.spdx.json'",
    "Upload the SBOM as a release artifact alongside your compiled assets",
    "Consider using GitHub's built-in dependency graph as supplementary SBOM source",
]
docs_url = "https://github.com/anchore/syft"
context_hints = ["has_compiled_assets", "has_releases"]

[controls."OSPS-QA-04.02"]
name = "SubprojectSecurity"
description = "Subprojects enforce security as strict as primary codebase"
tags = { level = 3, domain = "QA", quality = true, security = true }
when = { has_subprojects = true }

# Pattern: Check for consistent security configuration across subprojects
[[controls."OSPS-QA-04.02".passes]]
handler = "pattern"
files = ["**/SECURITY.md", "**/CODEOWNERS", "**/.github/workflows/*.yml"]
pass_if_any = true

[controls."OSPS-QA-04.02".passes.pattern.patterns]
security_config = "(security|codeowners|workflow)"

[[controls."OSPS-QA-04.02".passes]]
handler = "manual"
steps = [
    "Verify subprojects follow the same security standards as the main project",
    "Check that security policies apply uniformly across all subprojects",
    "Confirm subprojects have equivalent branch protection and review requirements",
]

[controls."OSPS-QA-04.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-04.02".remediation.handlers]]
handler = "manual"
steps = [
    "Audit each subproject for consistent security configuration (SECURITY.md, CODEOWNERS, CI workflows)",
    "Ensure branch protection rules apply to all subproject branches",
    "Add shared CI workflows that run security checks across all subprojects",
    "Document security standards in a top-level SECURITY.md that applies to all subprojects",
]
context_hints = ["has_subprojects"]

[controls."OSPS-QA-07.01"]
name = "RequiredApprovals"
description = "Pull requests require approval before merge"
tags = { level = 3, domain = "QA", quality = true, code-review = true }
when = { platform = "github" }

# ExecPass: Check if branch protection requires approvals
[[controls."OSPS-QA-07.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO/branches/$BRANCH/protection", "--jq", ".required_pull_request_reviews.required_approving_review_count >= 1"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "text"
expr = 'output.stdout.startsWith("true")'
timeout = 30

[[controls."OSPS-QA-07.01".passes]]
handler = "manual"
steps = [
    "Navigate to Repository Settings → Branches",
    "Check branch protection rule for main/master",
    "Verify 'Require approvals' is enabled with at least 1 required",
]

[controls."OSPS-QA-07.01".remediation]
safe = false
requires_api = true
dry_run_supported = false

[[controls."OSPS-QA-07.01".remediation.handlers]]
handler = "api_call"
method = "PUT"
endpoint = "/repos/$OWNER/$REPO/branches/$BRANCH/protection"
payload_template = "pr_review_payload"

[[controls."OSPS-QA-07.01".remediation.handlers]]
handler = "manual"
steps = [
    "Go to https://github.com/${owner}/${repo}/settings/branches",
    "Click 'Add branch protection rule' (or edit existing rule for main/master)",
    "Enable 'Require a pull request before merging'",
    "Set 'Required number of approvals before merging' to at least 1",
    "Click 'Save changes'",
]
docs_url = "https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/managing-a-branch-protection-rule"

[controls."OSPS-QA-06.02"]
name = "DocumentedTesting"
description = "Testing instructions are documented"
tags = { level = 3, domain = "QA", quality = true, testing = true, documentation = true }

[[controls."OSPS-QA-06.02".passes]]
handler = "pattern"
files = ["README.md", "CONTRIBUTING.md", "docs/testing.md"]

[controls."OSPS-QA-06.02".passes.pattern.patterns]
test_docs = "(run.*test|test.*instruction|how to test)"

[[controls."OSPS-QA-06.02".passes]]
handler = "manual"
steps = [
    "Check README.md or CONTRIBUTING.md for test instructions",
    "Verify instructions explain how to run the test suite",
    "Confirm any required setup or dependencies for testing are documented",
]

[controls."OSPS-QA-06.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-06.02".remediation.handlers]]
handler = "manual"
steps = [
    "Add a 'Testing' section to README.md or CONTRIBUTING.md",
    "Document how to install test dependencies and run the test suite",
    "Include examples of running specific test subsets if applicable",
    "Document any environment setup required (databases, env vars, fixtures)",
]

[controls."OSPS-QA-06.03"]
name = "TestRequirements"
description = "Test requirements for contributions are documented"
tags = { level = 3, domain = "QA", quality = true, testing = true, contributing = true }

[[controls."OSPS-QA-06.03".passes]]
handler = "pattern"
files = ["CONTRIBUTING.md"]

[controls."OSPS-QA-06.03".passes.pattern.patterns]
test_req = "(test.*required|must.*test|include.*test)"

[[controls."OSPS-QA-06.03".passes]]
handler = "manual"
steps = [
    "Review CONTRIBUTING.md for test requirements",
    "Verify contributors are informed that tests are required",
    "Confirm testing expectations are clearly stated",
]

[controls."OSPS-QA-06.03".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-06.03".remediation.handlers]]
handler = "manual"
steps = [
