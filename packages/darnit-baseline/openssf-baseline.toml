files = ["SECURITY.md"]

[controls."OSPS-VM-01.01".passes.pattern.patterns]
disclosure = "(disclos|report|contact)"
process = "(process|procedure|timeline)"

[[controls."OSPS-VM-01.01".passes]]
handler = "manual"
steps = [
    "Check SECURITY.md for disclosure policy section",
    "Verify process for reporting vulnerabilities is documented",
    "Confirm expected timeline for acknowledgment/response is provided",
]

[controls."OSPS-VM-01.01".remediation]
