steps = [
    "Check CI workflows for automated SAST scanning",
    "Verify SAST tool (CodeQL, Semgrep, Bandit, etc.) is configured",
    "Confirm SAST runs on pull requests and/or main branch",
]

[controls."OSPS-VM-06.02".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-VM-06.02".remediation.handlers]]
handler = "file_create"
path = ".github/workflows/sast.yml"
template = "sast_workflow"
overwrite = false
create_dirs = true

[[controls."OSPS-VM-06.02".remediation.handlers]]
handler = "manual"
steps = [
    "Add a SAST workflow to .github/workflows/ (e.g., codeql-analysis.yml)",
    "For GitHub: use 'github/codeql-action' for CodeQL analysis",
    "For other tools: integrate Semgrep, Bandit (Python), Gosec (Go), or Brakeman (Ruby)",
    "Configure to run on pull requests and pushes to the main branch",
]
docs_url = "https://docs.github.com/en/code-security/code-scanning/introduction-to-code-scanning/about-code-scanning"

# =============================================================================
# Level 3 Controls - Documentation (DO)
# =============================================================================

[controls."OSPS-DO-03.01"]
name = "SupportDocumentation"
description = "Support documentation available"
tags = { level = 3, domain = "DO", documentation = true, support = true }

[controls."OSPS-DO-03.01".locator]
project_path = "documentation.support"
discover = ["SUPPORT.md", ".github/SUPPORT.md"]
kind = "file"

[controls."OSPS-DO-03.01".locator.llm_hints]
search_for = "support, help, getting help, community support"
check_files = ["README.md"]
look_for_urls = true

[[controls."OSPS-DO-03.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: support doc should describe how to get help
[[controls."OSPS-DO-03.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pattern = '(?i)(support|help|issue|question)'
min_matches = 1

[[controls."OSPS-DO-03.01".passes]]
handler = "manual"
steps = [
    "Check for SUPPORT.md in repository root or .github/ directory",
    "Verify support documentation explains how to get help",
    "Confirm support channels (issues, discussions, chat) are documented",
]

[controls."OSPS-DO-03.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-DO-03.01".remediation.handlers]]
handler = "file_create"
path = "SUPPORT.md"
template = "support_template"
overwrite = false

[controls."OSPS-DO-03.02"]
name = "VerifyReleaseAuthor"
description = "Provide instructions to verify release author identity"
tags = { level = 3, domain = "DO", documentation = true, releases = true, security = true }

[[controls."OSPS-DO-03.02".passes]]
handler = "pattern"
files = ["SECURITY.md", "README.md", "docs/releases.md", "CONTRIBUTING.md"]

[controls."OSPS-DO-03.02".passes.pattern.patterns]
verify_author = "(verify|verif|signature|sign|GPG|Sigstore).*(author|release|identity)"

[[controls."OSPS-DO-03.02".passes]]
handler = "manual"
steps = [
    "Verify documentation explains how to verify release author identity",
    "Check for GPG/Sigstore signature verification instructions",
    "Confirm public keys or keyserver references are provided",
]

[controls."OSPS-DO-04.01"]
name = "SupportScopeStatement"
description = "Document scope and duration of support"
tags = { level = 3, domain = "DO", documentation = true, support = true }

[[controls."OSPS-DO-04.01".passes]]
handler = "pattern"
files = ["SUPPORT.md", "SECURITY.md", "README.md"]

[controls."OSPS-DO-04.01".passes.pattern.patterns]
support_scope = "(support.*(scope|duration|period|timeline)|version.*(support|maintenance))"

[[controls."OSPS-DO-04.01".passes]]
handler = "manual"
steps = [
    "Verify documentation describes which versions are supported",
    "Check that support duration or maintenance windows are documented",
    "Confirm scope of support (security fixes, bug fixes, features) is defined",
]

[controls."OSPS-DO-04.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-DO-04.01".remediation.handlers]]
handler = "file_create"
path = "SUPPORT.md"
template = "support_scope_template"
overwrite = false

[[controls."OSPS-DO-04.01".remediation.handlers]]
handler = "manual"
steps = [
    "Add a 'Support Scope' section to SUPPORT.md (or create the file)",
    "Document which versions are currently supported",
    "Specify support duration and maintenance windows",
    "Define scope: security fixes, bug fixes, feature requests",
]

[controls."OSPS-DO-05.01"]
name = "EndOfSupportPolicy"
description = "End-of-support policy documented"
tags = { level = 3, domain = "DO", documentation = true, support = true }

[[controls."OSPS-DO-05.01".passes]]
handler = "pattern"
files = ["SUPPORT.md", "SECURITY.md", "README.md"]

[controls."OSPS-DO-05.01".passes.pattern.patterns]
eol_policy = "(end.of.(life|support)|EOL|deprecat|sunset)"

[[controls."OSPS-DO-05.01".passes]]
handler = "manual"
steps = [
    "Check SUPPORT.md, SECURITY.md, or README.md for EOL policy",
    "Verify documentation describes end-of-support timeline",
    "Confirm deprecation and sunset procedures are documented",
]

[controls."OSPS-DO-05.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-DO-05.01".remediation.handlers]]
handler = "file_create"
path = "SUPPORT.md"
template = "end_of_support_template"
overwrite = false

[[controls."OSPS-DO-05.01".remediation.handlers]]
handler = "manual"
steps = [
    "Add an 'End of Support Policy' section to SUPPORT.md (or create the file)",
    "Document the notification process for approaching end-of-support",
    "Include migration guidance for upgrading to supported versions",
    "Describe what happens after support ends",
]

# =============================================================================
# Level 3 Controls - Governance (GV)
# =============================================================================

[controls."OSPS-GV-04.01"]
name = "CollaboratorReviewPolicy"
description = "Collaborator review policy documented"
tags = { level = 3, domain = "GV", governance = true, code-review = true }

# FileExistsPass: CODEOWNERS file indicates a review policy is in place
[[controls."OSPS-GV-04.01".passes]]
handler = "file_exists"
files = ["CODEOWNERS", ".github/CODEOWNERS", "docs/CODEOWNERS"]

# PatternPass: Check governance docs for review policy language
[[controls."OSPS-GV-04.01".passes]]
handler = "pattern"
files = ["GOVERNANCE.md", "CONTRIBUTING.md"]

[controls."OSPS-GV-04.01".passes.pattern.patterns]
review_policy = "(review|collaborator|maintainer).*(policy|process|requirement)"

[[controls."OSPS-GV-04.01".passes]]
handler = "manual"
steps = [
    "Check GOVERNANCE.md or CONTRIBUTING.md for review policy",
    "Verify code review requirements are documented",
    "Confirm collaborator onboarding/offboarding processes exist",
]

[controls."OSPS-GV-04.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-GV-04.01".remediation.handlers]]
handler = "file_create"
path = "CODEOWNERS"
template = "codeowners_template"
overwrite = false

# Context requirements - orchestrator checks these before running remediation
[[controls."OSPS-GV-04.01".remediation.requires_context]]
key = "maintainers"
required = true
confidence_threshold = 0.9
prompt_if_auto_detected = true
warning = "GitHub collaborators are not necessarily project maintainers. Please confirm who should be code owners."

# =============================================================================
# Level 2 Controls - Security Assessment (SA)
# =============================================================================

[controls."OSPS-SA-01.01"]
name = "DesignDocumentation"
description = "Provide design documentation showing actions and actors"
tags = { level = 2, domain = "SA", documentation = true, architecture = true }

[controls."OSPS-SA-01.01".locator]
project_path = "documentation.design"
discover = ["ARCHITECTURE.md", "docs/architecture.md", "docs/design.md", "DESIGN.md"]
kind = "file"

[controls."OSPS-SA-01.01".locator.llm_hints]
search_for = "architecture, design documentation, system design, actors, components"
check_files = ["README.md", "docs/README.md"]
look_for_urls = true

[[controls."OSPS-SA-01.01".passes]]
handler = "pattern"
files = ["ARCHITECTURE.md", "docs/architecture.md", "docs/design.md", "DESIGN.md", "README.md"]
pass_if_any = true

[controls."OSPS-SA-01.01".passes.pattern.patterns]
design_docs = "(?mi)(architecture|design|component|actor|system.*diagram)"

[[controls."OSPS-SA-01.01".passes]]
handler = "manual"
steps = [
    "Verify design documentation exists describing system architecture",
    "Check that documentation shows actions and actors in the system",
    "Confirm documentation helps users understand how the system works",
]

[controls."OSPS-SA-02.01"]
name = "APIDocumentation"
description = "API/interface documentation available"
tags = { level = 2, domain = "SA", documentation = true, api = true }

[controls."OSPS-SA-02.01".locator]
project_path = "documentation.api"
discover = ["API.md", "docs/api.md", "docs/api/", "openapi.yaml", "openapi.json", "swagger.yaml", "swagger.json"]
kind = "file"

[controls."OSPS-SA-02.01".locator.llm_hints]
search_for = "API documentation, API reference, endpoints"
check_files = ["README.md"]
look_for_urls = true

# Check for API documentation in dedicated files OR README sections
# The pattern pass looks for API/interface documentation headings
[[controls."OSPS-SA-02.01".passes]]
handler = "pattern"
files = ["API.md", "docs/api.md", "README.md", "docs/README.md", "USAGE.md", "docs/getting-started.md", "openapi.yaml", "openapi.json", "swagger.yaml", "swagger.json"]
pass_if_any = true

[controls."OSPS-SA-02.01".passes.pattern.patterns]
api_section = "(?mi)^#.*\\b(api|interface|usage|methods|functions|endpoints|cli|commands?)\\b"

[[controls."OSPS-SA-02.01".passes]]
handler = "manual"
steps = [
    "Check for API documentation (API.md, docs/api.md, README.md)",
    "Verify interface documentation describes available methods/endpoints",
    "Confirm usage instructions explain how to interact with the project",
]

[controls."OSPS-SA-03.01"]
name = "SecurityAssessment"
description = "Perform security assessment before major releases"
tags = { level = 2, domain = "SA", security = true, releases = true }
when = { has_releases = true }

[[controls."OSPS-SA-03.01".passes]]
handler = "manual"
steps = [
    "Verify that security assessments are performed before major releases",
    "Check for evidence of security review process (checklists, sign-offs, etc.)",
    "Confirm that security findings are addressed before release",
]

[[controls."OSPS-SA-03.01".passes]]
handler = "pattern"
files = ["SECURITY.md", "docs/security.md", "CONTRIBUTING.md"]

[controls."OSPS-SA-03.01".passes.pattern.patterns]
security_assessment = "(security.*(assessment|review|audit)|pre-release.*security)"

# =============================================================================
# Level 3 Controls - Security Assessment (SA)
# =============================================================================

[controls."OSPS-SA-03.02"]
name = "ThreatModel"
description = "Threat model documentation available"
tags = { level = 3, domain = "SA", security = true, threat-modeling = true }

[controls."OSPS-SA-03.02".locator]
