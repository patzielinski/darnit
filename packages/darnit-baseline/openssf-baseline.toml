[templates.ci_test_workflow]
description = "Basic CI test workflow for GitHub Actions"
content = """name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: Replace with your project's test command
      - name: Run tests
        run: echo "Add your test command here"
"""

[templates.sbom_workflow]
description = "SBOM generation workflow using syft (default) or configurable tool"
content = """name: Generate SBOM

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ github.event.release.tag_name || 'snapshot' }}.spdx.json
          output-file: sbom.spdx.json

      - name: Upload SBOM as release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.spdx.json
"""

[templates.sast_workflow]
description = "SAST scanning workflow using CodeQL (default) or configurable tool"
content = """name: SAST Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
"""

[templates.sca_workflow]
description = "SCA dependency scanning workflow for pull requests"
content = """name: Dependency Review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
"""

[templates.release_signing_workflow]
description = "Release signing workflow using GitHub artifact attestation"
content = """name: Sign Release

on:
  release:
    types: [ published ]

permissions:
  id-token: write
