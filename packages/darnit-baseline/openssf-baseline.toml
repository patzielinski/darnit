# =============================================================================

[controls."OSPS-SA-01.01"]
name = "DesignDocumentation"
description = "Provide design documentation showing actions and actors"
tags = { level = 2, domain = "SA", documentation = true, architecture = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-SA-01.01"
location_hint = "docs/ARCHITECTURE.md"
help_md = """Create architecture/design documentation.

**Remediation:**
1. Create docs/ARCHITECTURE.md
2. Document system components
3. Include data flow diagrams
4. Explain security boundaries
"""

[controls."OSPS-SA-01.01".locator]
project_path = "documentation.design"
discover = ["ARCHITECTURE.md", "docs/architecture.md", "docs/design.md", "DESIGN.md"]
kind = "file"

[controls."OSPS-SA-01.01".locator.llm_hints]
search_for = "architecture, design documentation, system design, actors, components"
check_files = ["README.md", "docs/README.md"]
look_for_urls = true

[[controls."OSPS-SA-01.01".passes]]
handler = "pattern"
files = ["ARCHITECTURE.md", "docs/architecture.md", "docs/design.md", "DESIGN.md", "README.md"]
pass_if_any = true

[controls."OSPS-SA-01.01".passes.pattern.patterns]
components_described = '(?si)(component|module|service|layer).{0,80}(description|responsible|handles|provides)'
actors_described = '(?si)(actor|user|client|admin|system).{0,60}(interact|access|connect|send|receive)'
data_flow = '(?si)(data flow|request|response|input|output).{0,60}(→|->|to|from|through)'

# AI evaluation: does the design doc describe real architecture?
[[controls."OSPS-SA-01.01".passes]]
handler = "llm_eval"
prompt = """Evaluate whether this design/architecture document describes real system architecture:
1. Does it identify concrete components, modules, or services?
2. Does it describe actors (users, systems) that interact with the software?
3. Does it explain data flows or interactions between components?
A document with only TBD/TODO placeholders or generic headings without content MUST fail."""
files_to_include = ["$FOUND_FILE"]
confidence_threshold = 0.7
analysis_hints = [
    "Look for named components with descriptions of what they do",
    "Check for actors or users with described interactions",
    "Data flow diagrams or textual descriptions both count",
    "TBD/TODO placeholders indicate incomplete content",
]

[[controls."OSPS-SA-01.01".passes]]
handler = "manual"
steps = [
    "Verify design documentation exists describing system architecture",
    "Check that documentation shows actions and actors in the system",
    "Confirm documentation helps users understand how the system works",
]

[controls."OSPS-SA-01.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-SA-01.01".remediation.handlers]]
handler = "file_create"
path = "ARCHITECTURE.md"
template = "architecture_template"
overwrite = false
llm_enhance = "Customize this architecture document: analyze the project source code to identify real components, modules, and services; describe actual data flows based on the codebase; and identify real actors (users, admins, external systems) that interact with the software."

[controls."OSPS-SA-02.01"]
name = "APIDocumentation"
description = "API/interface documentation available"
tags = { level = 2, domain = "SA", documentation = true, api = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-SA-02.01"
location_hint = "docs/API.md"
help_md = """Document external APIs and interfaces.

**Remediation:**
1. Create API documentation
2. Document all public endpoints
3. Include authentication requirements
4. Use OpenAPI/Swagger for REST APIs
"""

[controls."OSPS-SA-02.01".locator]
project_path = "documentation.api"
discover = ["API.md", "docs/api.md", "docs/api/", "openapi.yaml", "openapi.json", "swagger.yaml", "swagger.json"]
kind = "file"

[controls."OSPS-SA-02.01".locator.llm_hints]
search_for = "API documentation, API reference, endpoints"
check_files = ["README.md"]
look_for_urls = true

# Check for API documentation in dedicated files OR README sections
[[controls."OSPS-SA-02.01".passes]]
handler = "pattern"
files = ["API.md", "docs/api.md", "README.md", "docs/README.md", "USAGE.md", "docs/getting-started.md", "openapi.yaml", "openapi.json", "swagger.yaml", "swagger.json"]
pass_if_any = true

[controls."OSPS-SA-02.01".passes.pattern.patterns]
api_heading_with_content = '(?si)^#{1,3}.*\b(api|interface|usage|methods|functions|endpoints|cli|commands?)\b.*\n\n.{100,}'
openapi_spec = '(?i)(openapi|swagger).*:\s*["\x27]?\d+\.\d+'
endpoint_documentation = '(?si)(GET|POST|PUT|DELETE|PATCH)\s+/\S+.{20,}'

# AI evaluation: does the API doc cover actual endpoints/interfaces?
[[controls."OSPS-SA-02.01".passes]]
handler = "llm_eval"
prompt = """Evaluate whether this API/interface documentation describes real APIs or interfaces:
1. Does it document specific endpoints, methods, functions, or CLI commands?
2. Does it include parameter descriptions, request/response formats, or usage examples?
3. Is this substantive documentation, not just a heading with no content?
A document with only headings or TODO placeholders MUST fail."""
files_to_include = ["$FOUND_FILE"]
confidence_threshold = 0.7
analysis_hints = [
    "Look for documented endpoints, methods, or CLI commands",
    "Check for parameter descriptions or usage examples",
    "OpenAPI/Swagger specs count as valid API documentation",
    "A heading saying 'API' with no content underneath does not count",
]

[[controls."OSPS-SA-02.01".passes]]
handler = "manual"
steps = [
    "Check for API documentation (API.md, docs/api.md, README.md)",
    "Verify interface documentation describes available methods/endpoints",
    "Confirm usage instructions explain how to interact with the project",
]

[controls."OSPS-SA-02.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-SA-02.01".remediation.handlers]]
handler = "file_create"
path = "API.md"
template = "api_documentation_template"
overwrite = false
llm_enhance = "Customize this API documentation: analyze the project source code to identify real endpoints, CLI commands, or library interfaces; document actual parameters, return types, and usage examples based on the codebase."

