[controls."OSPS-BR-07.01"]
name = "GitignoreSecrets"
description = "Secret files are properly gitignored"
tags = { level = 1, domain = "BR", build = true, secrets = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-BR-07.01"
location_hint = ".gitignore"
help_md = """Configure secret scanning and .gitignore to prevent secret leaks.

**Remediation:**
1. Enable GitHub Secret Scanning
2. Add sensitive file patterns to .gitignore
3. Use pre-commit hooks for secret detection
4. Review commit history for exposed secrets

**Example .gitignore:**
```
.env
*.pem
*.key
credentials.json
```
"""

[controls."OSPS-BR-07.01".locator]
project_path = "ci.gitignore"
discover = [".gitignore"]
kind = "file"

[[controls."OSPS-BR-07.01".passes]]
handler = "file_exists"
use_locator = true

[[controls."OSPS-BR-07.01".passes]]
handler = "pattern"
files = [".gitignore"]

[controls."OSPS-BR-07.01".passes.pattern.patterns]
env_files = '\\.env'
key_files = '\*\.key|\*\.pem'
credential_files = '(?i)(credentials|secrets?)\.json|\.secret'

[controls."OSPS-BR-07.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-BR-07.01".remediation.handlers]]
handler = "file_create"
path = ".gitignore"
template = "gitignore_secrets"
overwrite = false

# =============================================================================
# Level 2 Controls - Build & Release (BR)
# =============================================================================

[controls."OSPS-BR-02.01"]
name = "UniqueVersionIdentifiers"
description = "Assign unique version identifiers to each official release"
tags = { level = 2, domain = "BR", build = true, releases = true }
when = { has_releases = true, platform = "github" }

# ExecPass: Check GitHub releases have unique version tags
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-BR-02.01"
help_md = """Use semantic versioning for releases.

**Remediation:**
1. Use semantic versioning (MAJOR.MINOR.PATCH)
2. Tag releases in git
3. Ensure no duplicate version numbers
"""

[[controls."OSPS-BR-02.01".passes]]
handler = "exec"
command = ["gh", "release", "list", "--json", "tagName", "--limit", "10"]
pass_exit_codes = [0]
output_format = "json"
expr = 'size(output.json) > 0'
timeout = 30

[[controls."OSPS-BR-02.01".passes]]
handler = "manual"
steps = [
    "Verify each release has a unique version identifier (e.g., semver)",
    "Check that version identifiers are not reused across releases",
    "Confirm releases are tagged with their version identifiers in the VCS",
]

[controls."OSPS-BR-02.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-BR-02.01".remediation.handlers]]
handler = "manual"
steps = [
    "Adopt semantic versioning (semver) for all releases",
    "Tag each release in git with its version number: git tag v1.2.3",
    "Use 'gh release create' or CI automation to create GitHub releases from tags",
]
docs_url = "https://semver.org/"
context_hints = ["build.has_releases"]

[controls."OSPS-BR-04.01"]
name = "ReleaseChangelog"
description = "Releases include log of functional and security modifications"
tags = { level = 2, domain = "BR", build = true, releases = true, documentation = true }
when = { has_releases = true, platform = "github" }
help_md = """This control can be satisfied in two ways:

1. **GitHub Releases with notes** (preferred for projects using GitHub releases):
   - Create releases via GitHub's release feature
   - Include release notes in the release body describing changes
   - No CHANGELOG.md file is needed if releases have notes

2. **CHANGELOG.md file** (for projects not using GitHub releases):
   - Create a CHANGELOG.md, CHANGES.md, HISTORY.md, or NEWS.md file
   - Document functional and security-relevant changes for each version

**Note:** If you use GitHub releases for release notes, you do NOT need a CHANGELOG.md file.
"""

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-BR-04.01"
location_hint = "CHANGELOG.md"

[controls."OSPS-BR-04.01".locator]
project_path = "documentation.changelog"
discover = ["CHANGELOG.md", "CHANGES.md", "HISTORY.md", "NEWS.md"]
kind = "file"

# Pass 1: Check GitHub releases for release notes
[[controls."OSPS-BR-04.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO/releases?per_page=5"]
pass_exit_codes = [0]
output_format = "json"
expr = 'size(output.json) > 0 && has(output.json[0].body) && output.json[0].body != ""'
timeout = 30

# Pass 2: Fallback — check for CHANGELOG.md or equivalent
[[controls."OSPS-BR-04.01".passes]]
handler = "file_exists"
use_locator = true

[[controls."OSPS-BR-04.01".passes]]
handler = "manual"
steps = [
    "Verify releases have release notes OR a CHANGELOG.md equivalent exists",
    "Check that each release/version documents functional changes",
    "Confirm security-relevant changes are clearly marked",
]

[controls."OSPS-BR-04.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-BR-04.01".remediation.handlers]]
handler = "manual"
steps = [
    "Create a CHANGELOG.md in the repository root",
    "Document functional changes for each release version",
    "Use GitHub release notes or 'gh release create --generate-notes' for automation",
    "Mark security-relevant changes clearly (e.g., with [SECURITY] prefix)",
]
docs_url = "https://keepachangelog.com/"
context_hints = ["build.has_releases"]

[controls."OSPS-BR-05.01"]
name = "StandardizedDependencyTools"
description = "Use standardized tooling for dependency ingestion"
tags = { level = 2, domain = "BR", build = true, dependencies = true }

# Deterministic: Check for standard dependency manifest files
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-BR-05.01"
location_hint = "package-lock.json"
help_md = """Use standard package managers and lockfiles.

**Remediation:**
1. Use npm/yarn (Node), pip/poetry (Python), etc.
2. Commit lockfiles to repository
3. Pin dependency versions
"""

[[controls."OSPS-BR-05.01".passes]]
handler = "file_exists"
files = [
    "package.json",
    "package-lock.json",
    "requirements.txt",
    "pyproject.toml",
    "Cargo.toml",
    "go.mod",
    "go.sum",
    "pom.xml",
    "build.gradle",
    "Gemfile.lock",
]

# Content validation: manifest should contain dependency declarations
[[controls."OSPS-BR-05.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pattern = '(?i)(depend|require|"name"|"version"|\[project\])'
min_matches = 1

[[controls."OSPS-BR-05.01".passes]]
handler = "manual"
steps = [
    "Verify the project uses standard package managers (npm, pip, cargo, go mod, etc.)",
    "Check that dependencies are declared in standard manifest files",
    "Confirm dependency resolution uses reproducible tooling",
]

[controls."OSPS-BR-05.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-BR-05.01".remediation.handlers]]
handler = "manual"
steps = [
    "Use a standard package manager for your ecosystem (npm, pip/uv, cargo, go mod, etc.)",
    "Ensure all dependencies are declared in manifest files (package.json, pyproject.toml, etc.)",
    "Use lockfiles (package-lock.json, uv.lock, Cargo.lock) for reproducible builds",
]

[controls."OSPS-BR-06.01"]
name = "SignReleases"
description = "Sign releases or provide signed manifest containing hashes"
tags = { level = 2, domain = "BR", build = true, releases = true, security = true }
when = { has_releases = true }

# Pattern: Check workflows or docs for signing mentions
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-BR-06.01"
help_md = """Sign releases or provide checksums.

**Remediation:**
1. Use Sigstore/cosign for signing
2. Generate SHA256 checksums for artifacts
3. Include checksums in release notes
4. Consider using GitHub artifact attestations
"""

[[controls."OSPS-BR-06.01".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml", "SECURITY.md", "README.md"]

[controls."OSPS-BR-06.01".passes.pattern.patterns]
signing = "(GPG|Sigstore|sign|cosign|checksums?|SHA256|signature)"

[[controls."OSPS-BR-06.01".passes]]
handler = "manual"
steps = [
    "Verify releases are cryptographically signed (GPG, Sigstore, etc.)",
    "Or verify a signed manifest with hashes is provided for release assets",
    "Check that public keys or verification instructions are documented",
]

[controls."OSPS-BR-06.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-BR-06.01".remediation.handlers]]
handler = "file_create"
path = ".github/workflows/release-signing.yml"
template = "release_signing_workflow"
overwrite = false
create_dirs = true

[[controls."OSPS-BR-06.01".remediation.handlers]]
handler = "manual"
steps = [
    "Set up Sigstore cosign or GPG signing in your release workflow",
    "For Sigstore: add sigstore/cosign-installer action and sign release artifacts",
    "For GPG: configure GPG key in CI and sign tags with 'git tag -s'",
    "Document verification instructions in your release notes or README",
]
docs_url = "https://docs.sigstore.dev/signing/quickstart/"
context_hints = ["build.signing_method", "build.has_releases"]

# =============================================================================
# Level 1 Controls - Documentation (DO)
# =============================================================================

[controls."OSPS-DO-01.01"]
name = "HasReadme"
description = "Repository has a README file"
tags = { level = 1, domain = "DO", documentation = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-DO-01.01"
location_hint = "README.md"
help_md = """Create user documentation for basic functionality.

**Remediation:**
1. Create a README.md with usage instructions
2. Add installation guide
3. Include basic examples
4. Consider adding a docs/ directory for detailed documentation
"""

[controls."OSPS-DO-01.01".locator]
project_path = "documentation.readme"
discover = ["README.md", "README.rst", "README.txt", "README", "readme.md"]
kind = "file"

[[controls."OSPS-DO-01.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: README must have a heading followed by substantive content
[[controls."OSPS-DO-01.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pass_if_any = true

[controls."OSPS-DO-01.01".passes.pattern.patterns]
heading_with_content = '(?si)^#\s+\S.*\n\n.{200,}'
rst_heading_with_content = '(?si)^[=\-~]{3,}\n.+\n[=\-~]{3,}\n\n.{200,}'

# AI evaluation: does the README explain the project meaningfully?
[[controls."OSPS-DO-01.01".passes]]
handler = "llm_eval"
prompt = """Evaluate whether this README adequately documents the project:
1. Does it explain what the project does?
2. Does it include installation or setup instructions?
3. Does it provide usage examples or getting-started guidance?
A README with only TODO placeholders or a single heading MUST fail."""
files_to_include = ["$FOUND_FILE"]
confidence_threshold = 0.7
analysis_hints = [
    "Check for project description beyond just the name",
    "Look for install/setup instructions",
    "Look for usage examples or code snippets",
    "TODO placeholders do not count as real content",
]

[[controls."OSPS-DO-01.01".passes]]
handler = "manual"
steps = [
    "Navigate to repository root directory",
    "Verify a README file exists (README.md, README.rst, or similar)",
    "Check that README contains project description and basic usage",
]

[controls."OSPS-DO-01.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-DO-01.01".remediation.handlers]]
handler = "file_create"
path = "README.md"
template = "readme_basic"
overwrite = false
llm_enhance = "Customize this README for the project: replace the placeholder description with a real explanation of what the project does, update install instructions for the actual package manager and language, and add real usage examples based on the project's source code."

[controls."OSPS-DO-01.01".remediation.project_update]
set = { "documentation.readme.path" = "README.md" }

[controls."OSPS-DO-02.01"]
name = "BugReportingProcess"
description = "Document bug reporting process"
tags = { level = 1, domain = "DO", documentation = true, issues = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-DO-02.01"
location_hint = ".github/ISSUE_TEMPLATE"
help_md = """Create a guide for reporting bugs and defects.

**Remediation:**
1. Create .github/ISSUE_TEMPLATE/bug_report.md
2. Include expected vs actual behavior fields
3. Add reproduction steps template
4. Link to issue tracker in README
"""

[controls."OSPS-DO-02.01".locator]
project_path = "security.policy"
discover = [".github/ISSUE_TEMPLATE/bug_report.md", ".github/ISSUE_TEMPLATE/bug_report.yml", ".github/ISSUE_TEMPLATE.md"]
kind = "file"

[controls."OSPS-DO-02.01".locator.llm_hints]
search_for = "bug report, issue template, report bugs"
check_files = ["README.md", "CONTRIBUTING.md"]
look_for_urls = false

[[controls."OSPS-DO-02.01".passes]]
handler = "file_exists"
use_locator = true

[[controls."OSPS-DO-02.01".passes]]
handler = "pattern"
files = [".github/ISSUE_TEMPLATE/bug_report.md", ".github/ISSUE_TEMPLATE/bug_report.yml", ".github/ISSUE_TEMPLATE.md", "README.md", "CONTRIBUTING.md"]
pass_if_any = true

[controls."OSPS-DO-02.01".passes.pattern.patterns]
template_structure = '(?si)(describe.*bug|steps.*reproduce|expected.*behav|actual.*behav)'
bug_reporting_link = '(?i)(report|submit|file).{0,30}(bug|issue|defect).{0,30}(http|github|tracker|template)'
issue_template_yaml = '(?i)^name:\s+.*(bug|defect|issue)'

[controls."OSPS-DO-02.01".remediation]
safe = true
dry_run_supported = true

# Declarative file creation remediation
[[controls."OSPS-DO-02.01".remediation.handlers]]
handler = "file_create"
path = ".github/ISSUE_TEMPLATE/bug_report.md"
template = "bug_report_template"
overwrite = false
create_dirs = true

