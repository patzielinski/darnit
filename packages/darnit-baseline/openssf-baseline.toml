# OpenSSF Baseline Framework Definition
# Declarative configuration for OSPS v2025.10.10 compliance controls
#
# This file defines all 62 controls across 3 maturity levels.
# Users can override settings via .baseline.toml in their repository.

[metadata]
name = "openssf-baseline"
display_name = "OpenSSF Baseline"
version = "0.1.0"
schema_version = "0.1.0-alpha"  # TOML config format version - expect breaking changes
spec_version = "OSPS v2025.10.10"
description = "OpenSSF Baseline security controls for open source projects"
url = "https://baseline.openssf.org/"

[defaults]
check_adapter = "builtin"
remediation_adapter = "builtin"

# =============================================================================
# Templates for Remediation
# =============================================================================

[templates.security_policy_standard]
description = "Standard SECURITY.md template for vulnerability reporting"
content = """# Security Policy

## Supported Versions

| Version | Supported          |
| ------- | ------------------ |
| latest  | :white_check_mark: |

## Reporting a Vulnerability

We take security vulnerabilities seriously. If you discover a security issue,
please report it responsibly.

### How to Report

**Please do NOT report security vulnerabilities through public GitHub issues.**

Instead, please report security vulnerabilities by:

1. **GitHub Security Advisories**: Use the "Report a vulnerability" button in
   the Security tab of this repository (preferred)
2. **Email**: Send details to security@$OWNER.github.io

### What to Include

Please include as much of the following information as possible:

- Type of issue (e.g., buffer overflow, SQL injection, cross-site scripting)
- Full paths of source file(s) related to the issue
- Location of the affected source code (tag/branch/commit or direct URL)
- Step-by-step instructions to reproduce the issue
- Proof-of-concept or exploit code (if possible)
- Impact of the issue

### Response Timeline

- **Initial Response**: Within 48 hours
- **Status Update**: Within 7 days
- **Resolution Target**: Within 90 days (depending on severity)

### Disclosure Policy

- We will acknowledge receipt of your report
- We will work with you to understand and resolve the issue
- We will keep you informed of our progress
- We will credit you in the security advisory (unless you prefer otherwise)

## Security Updates

Security updates will be released as patch versions and announced via:
- GitHub Security Advisories
- Release notes

## Vulnerability Exploitability (VEX)

When vulnerabilities are reported in our dependencies that do not affect this project,
we will provide VEX (Vulnerability Exploitability eXchange) statements explaining why
the vulnerability is not exploitable in our context.

VEX statements will be published as:
- GitHub Security Advisories with "not affected" status
- VEX documents in this repository (when applicable)

For more information about VEX, see:
- [OpenVEX Specification](https://openvex.dev/)
- [CISA VEX Guide](https://www.cisa.gov/resources-tools/resources/vulnerability-exploitability-exchange-vex-overview)
"""

[templates.security_policy_minimal]
description = "Minimal SECURITY.md template"
content = """# Security Policy

## Reporting a Vulnerability

Please report security vulnerabilities by:
- Using GitHub's "Report a vulnerability" feature in the Security tab
- Or emailing security@$OWNER.github.io

We will respond within 48 hours and work with you to resolve the issue.
"""

[templates.contributing_standard]
description = "Standard CONTRIBUTING.md template"
content = """# Contributing to $REPO

Thank you for your interest in contributing! This document provides guidelines
for contributing to this project.

## Code of Conduct

Please read and follow our Code of Conduct to keep our community approachable
and respectable.

## Getting Started

1. Fork the repository
2. Clone your fork: `git clone https://github.com/YOUR-USERNAME/$REPO.git`
3. Create a branch: `git checkout -b feature/your-feature-name`
4. Make your changes
5. Run tests: `make test` (or equivalent)
6. Commit your changes with a clear message
7. Push to your fork: `git push origin feature/your-feature-name`
8. Open a Pull Request

## Pull Request Guidelines

- Ensure your code follows the existing style
- Include tests for new functionality
- Update documentation as needed
- Keep PRs focused on a single change
- Write clear commit messages

## Reporting Issues

- Search existing issues before creating a new one
- Use the issue templates when available
- Provide as much context as possible

## Development Setup

```bash
# Clone the repository
git clone https://github.com/$OWNER/$REPO.git
cd $REPO

# Install dependencies
# (Add project-specific setup instructions here)
```

## Questions?

Feel free to open an issue for any questions about contributing.
"""

[templates.bug_report_template]
description = "GitHub issue template for bug reports"
content = """---
name: Bug Report
about: Create a report to help us improve
title: '[BUG] '
labels: bug
assignees: ''
---

## Describe the Bug
A clear and concise description of what the bug is.

## To Reproduce
Steps to reproduce the behavior:
1. Go to '...'
2. Click on '...'
3. See error

## Expected Behavior
A clear and concise description of what you expected to happen.

## Actual Behavior
What actually happened.

## Screenshots
If applicable, add screenshots to help explain your problem.

## Environment
- OS: [e.g., Ubuntu 22.04, macOS 14, Windows 11]
- Version: [e.g., v1.2.3]
- Other relevant info:

## Additional Context
Add any other context about the problem here.
"""

[templates.branch_protection_payload]
description = "JSON payload for GitHub branch protection API"
content = """
{
  "enforce_admins": true,
  "required_pull_request_reviews": {
    "required_approving_review_count": 1,
    "dismiss_stale_reviews": true,
    "require_code_owner_reviews": false
  },
  "required_status_checks": null,
  "restrictions": null,
  "required_linear_history": false,
  "allow_force_pushes": false,
  "allow_deletions": false
}
"""

[templates.dependabot_config]
description = "Dependabot configuration file"
content = """version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Add additional ecosystems as needed:
  # - package-ecosystem: "npm"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #   commit-message:
  #     prefix: "deps"
"""

# =============================================================================
# Context Definitions (Interactive Context Collection)
# =============================================================================
# These define context keys that can be collected from users to improve audit
# accuracy. Each key specifies its type, prompt, and which controls it affects.
#
# Note: The CNCF .project/ specification is still under development (PR #131).
# Context storage format may change as the upstream spec evolves.

[context.maintainers]
type = "list_or_path"
prompt = "Who are the project maintainers?"
hint = "Provide GitHub usernames (e.g., @user1, @user2) or path to MAINTAINERS.md"
examples = ["@user1, @user2", "MAINTAINERS.md"]
affects = ["OSPS-GV-01.01", "OSPS-GV-01.02", "OSPS-GV-04.01"]
store_as = "governance.maintainers"
auto_detect = true
auto_detect_method = "github_collaborators"  # Uses get_repo_maintainers() from GitHub API
required = false

[context.security_contact]
type = "string"
prompt = "What is the security contact for vulnerability reports?"
hint = "Email address, URL, or reference to SECURITY.md section"
examples = ["security@example.com", "https://example.com/security", "See SECURITY.md"]
affects = ["OSPS-VM-01.01", "OSPS-VM-02.01", "OSPS-VM-03.01"]
store_as = "security.contact"
auto_detect = false
required = false

[context.governance_model]
type = "enum"
prompt = "What governance model does this project use?"
hint = "Select the model that best describes how decisions are made"
values = ["bdfl", "meritocracy", "democracy", "corporate", "foundation", "committee", "other"]
examples = ["bdfl", "foundation"]
affects = ["OSPS-GV-01.01", "OSPS-GV-01.02"]
store_as = "governance.model"
auto_detect = false
required = false

[context.has_subprojects]
type = "boolean"
prompt = "Does this project have subprojects or related repositories?"
hint = "Set to false if this is a standalone project"
examples = ["true", "false"]
affects = ["OSPS-GV-01.02"]
store_as = "project.has_subprojects"
auto_detect = false
required = false

[context.has_releases]
type = "boolean"
prompt = "Does this project make official releases?"
hint = "Set to true if you publish versioned releases"
examples = ["true", "false"]
affects = ["OSPS-BR-02.01", "OSPS-BR-03.01", "OSPS-BR-04.01"]
store_as = "build.has_releases"
auto_detect = true
required = false

[context.is_library]
type = "boolean"
prompt = "Is this a library or framework consumed by other projects?"
hint = "Set to true if other projects depend on this as a dependency"
examples = ["true", "false"]
affects = ["OSPS-DO-04.01", "OSPS-BR-01.01"]
store_as = "project.is_library"
auto_detect = false
required = false

[context.has_compiled_assets]
type = "boolean"
prompt = "Does this project release compiled binaries or build artifacts?"
hint = "Set to true if you release binaries, containers, or other compiled assets"
examples = ["true", "false"]
affects = ["OSPS-BR-03.01", "OSPS-BR-04.01"]
store_as = "build.has_compiled_assets"
auto_detect = false
required = false

[context.ci_provider]
type = "enum"
prompt = "What CI/CD system does this project use?"
hint = "Select your primary CI/CD provider"
values = ["github", "gitlab", "jenkins", "circleci", "azure", "travis", "none", "other"]
examples = ["github", "gitlab"]
affects = ["OSPS-QA-03.01", "OSPS-QA-04.01"]
store_as = "ci.provider"
auto_detect = true
required = false

# =============================================================================
# Level 1 Controls - Access Control (AC)
# =============================================================================

[controls."OSPS-AC-01.01"]
name = "RequireMFA"
description = "Require multi-factor authentication for organization members"
tags = { level = 1, domain = "AC", security_severity = 8.0, access-control = true, authentication = true }
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-AC-01.01"

# ExecPass: Use gh CLI to check MFA requirement
[controls."OSPS-AC-01.01".passes.exec]
command = ["gh", "api", "/orgs/$OWNER"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
pass_if_json_path = "two_factor_requirement_enabled"
pass_if_json_value = "true"
timeout = 30

[controls."OSPS-AC-01.01".passes.manual]
steps = [
    "Navigate to Organization Settings → Security",
    "Verify 'Require two-factor authentication' is enabled",
]

[controls."OSPS-AC-02.01"]
name = "AllowForking"
description = "Allow repository forking for public collaboration"
tags = { level = 1, domain = "AC", access-control = true, collaboration = true }

# ExecPass: Check if forking is allowed via GitHub API
[controls."OSPS-AC-02.01".passes.exec]
command = ["gh", "api", "/repos/$OWNER/$REPO"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
pass_if_json_path = "allow_forking"
pass_if_json_value = "true"
timeout = 30

[controls."OSPS-AC-02.01".passes.manual]
steps = [
    "Navigate to Repository Settings → General",
    "Under 'Features', verify 'Allow forking' is enabled",
]

[controls."OSPS-AC-03.01"]
name = "PreventDirectCommits"
description = "Prevent direct commits to primary branch"
tags = { level = 1, domain = "AC", security_severity = 7.5, access-control = true, branch-protection = true }
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-AC-03.01"

# ExecPass: Use gh CLI to check branch protection
[controls."OSPS-AC-03.01".passes.exec]
command = ["gh", "api", "/repos/$OWNER/$REPO/branches/$BRANCH/protection"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
pass_if_json_path = "required_pull_request_reviews"
timeout = 30

[controls."OSPS-AC-03.01".passes.manual]
steps = [
    "Navigate to Repository Settings → Branches",
    "Verify branch protection rule exists for main/master",
    "Check 'Require a pull request before merging' is enabled",
]

[controls."OSPS-AC-03.01".remediation]
handler = "enable_branch_protection"  # Legacy handler for fallback
safe = true
requires_api = true
dry_run_supported = true

# Declarative API call remediation
[controls."OSPS-AC-03.01".remediation.api_call]
method = "PUT"
endpoint = "/repos/$OWNER/$REPO/branches/$BRANCH/protection"
payload_template = "branch_protection_payload"

[controls."OSPS-AC-03.02"]
name = "PreventBranchDeletion"
description = "Prevent deletion of primary branch"
tags = { level = 1, domain = "AC", access-control = true, branch-protection = true }

# ExecPass: Check if branch deletion is prevented via branch protection
[controls."OSPS-AC-03.02".passes.exec]
command = ["gh", "api", "/repos/$OWNER/$REPO/branches/$BRANCH/protection"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
pass_if_json_path = "allow_deletions.enabled"
pass_if_json_value = "false"
timeout = 30

[controls."OSPS-AC-03.02".passes.manual]
steps = [
    "Navigate to Repository Settings → Branches",
    "Check branch protection rule for main/master",
    "Verify 'Allow deletions' is NOT checked",
]

# =============================================================================
# Level 1 Controls - Build & Release (BR)
# =============================================================================

[controls."OSPS-BR-01.01"]
name = "SecureWorkflowInputs"
description = "Workflows handle untrusted inputs safely"
tags = { level = 1, domain = "BR", security_severity = 8.5, build = true, security = true, ci-cd = true }

[controls."OSPS-BR-01.01".passes.pattern]
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]
pass_if_any = false

[controls."OSPS-BR-01.01".passes.pattern.patterns]
injection_risk = "\\$\\{\\{\\s*github\\.(event\\.issue|event\\.pull_request|head_ref)"

[controls."OSPS-BR-01.01".passes.manual]
steps = [
    "Review GitHub workflow files in .github/workflows/",
    "Check that untrusted inputs are not used in run: blocks directly",
    "Verify ${{ github.event.* }} expressions are properly sanitized",
]

[controls."OSPS-BR-01.02"]
name = "SecureBranchNames"
description = "Branch names are handled safely in workflows"
tags = { level = 1, domain = "BR", build = true, security = true }

# Pattern: Check workflows don't use raw branch names unsafely
[controls."OSPS-BR-01.02".passes.pattern]
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]

[controls."OSPS-BR-01.02".passes.pattern.patterns]
# Look for safe patterns - quoting or using github.ref_name
safe_ref_usage = "(\\$\\{\\{ github\\.ref_name \\}\\}|\\$\\{\\{ github\\.head_ref \\}\\})"

[controls."OSPS-BR-01.02".passes.manual]
steps = [
    "Review CI/CD workflows for branch name handling",
    "Verify branch names are not used in shell commands without sanitization",
    "Check for proper quoting and escaping of branch name variables",
]

[controls."OSPS-BR-03.01"]
name = "SecureRepositoryURL"
description = "Repository URL uses HTTPS"
tags = { level = 1, domain = "BR", build = true, security = true }

# ExecPass: Verify repository URL uses HTTPS
[controls."OSPS-BR-03.01".passes.exec]
command = ["gh", "api", "/repos/$OWNER/$REPO", "--jq", ".html_url"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "text"
pass_if_output_matches = "^https://"
timeout = 30

[controls."OSPS-BR-03.01".passes.manual]
steps = [
    "Verify the repository URL in your browser address bar starts with https://",
    "Confirm all git clone URLs use https:// or git@ (SSH)",
]

[controls."OSPS-BR-03.02"]
name = "EncryptedDistribution"
description = "Official distribution channels use encrypted connections (HTTPS)"
tags = { level = 1, domain = "BR", build = true, security = true }

# Pattern: Check that README download links use HTTPS
[controls."OSPS-BR-03.02".passes.pattern]
files = ["README.md", "INSTALL.md", "docs/installation.md"]

[controls."OSPS-BR-03.02".passes.pattern.patterns]
https_links = "https://"

[controls."OSPS-BR-03.02".passes.manual]
steps = [
    "Verify all official download links use https://",
    "Confirm package registry URLs (npm, PyPI, etc.) use HTTPS",
    "Check that release asset download URLs use encrypted connections",
]

[controls."OSPS-BR-07.01"]
name = "GitignoreSecrets"
description = "Secret files are properly gitignored"
tags = { level = 1, domain = "BR", build = true, secrets = true }

[controls."OSPS-BR-07.01".locator]
project_path = "ci.gitignore"
discover = [".gitignore"]
kind = "file"

[controls."OSPS-BR-07.01".passes]
deterministic = { file_must_exist = [".gitignore"] }

[controls."OSPS-BR-07.01".passes.pattern]
files = [".gitignore"]

[controls."OSPS-BR-07.01".passes.pattern.patterns]
env_files = "\\.env"
key_files = "\\*\\.key|\\*\\.pem"

# =============================================================================
# Level 2 Controls - Build & Release (BR)
# =============================================================================

[controls."OSPS-BR-02.01"]
name = "UniqueVersionIdentifiers"
description = "Assign unique version identifiers to each official release"
tags = { level = 2, domain = "BR", build = true, releases = true }

# ExecPass: Check GitHub releases have unique version tags
[controls."OSPS-BR-02.01".passes.exec]
command = ["gh", "release", "list", "--json", "tagName", "--limit", "10"]
pass_exit_codes = [0]
output_format = "json"
timeout = 30

[controls."OSPS-BR-02.01".passes.manual]
steps = [
    "Verify each release has a unique version identifier (e.g., semver)",
    "Check that version identifiers are not reused across releases",
    "Confirm releases are tagged with their version identifiers in the VCS",
]

[controls."OSPS-BR-04.01"]
name = "ReleaseChangelog"
description = "Releases include log of functional and security modifications"
tags = { level = 2, domain = "BR", build = true, releases = true, documentation = true }

[controls."OSPS-BR-04.01".locator]
project_path = "documentation.changelog"
discover = ["CHANGELOG.md", "CHANGES.md", "HISTORY.md", "NEWS.md"]
kind = "file"

[controls."OSPS-BR-04.01".passes]
deterministic = { file_must_exist = [
    "CHANGELOG.md",
    "CHANGES.md",
    "HISTORY.md",
    "NEWS.md",
]}

[controls."OSPS-BR-04.01".passes.manual]
steps = [
    "Verify CHANGELOG.md or equivalent exists",
    "Check that each release documents functional changes",
    "Confirm security-relevant changes are clearly marked",
]

[controls."OSPS-BR-05.01"]
name = "StandardizedDependencyTools"
description = "Use standardized tooling for dependency ingestion"
tags = { level = 2, domain = "BR", build = true, dependencies = true }

# Deterministic: Check for standard dependency manifest files
[controls."OSPS-BR-05.01".passes]
deterministic = { file_must_exist = [
    "package.json",
    "package-lock.json",
    "requirements.txt",
    "pyproject.toml",
    "Cargo.toml",
    "go.mod",
    "go.sum",
    "pom.xml",
    "build.gradle",
    "Gemfile.lock",
]}

[controls."OSPS-BR-05.01".passes.manual]
steps = [
    "Verify the project uses standard package managers (npm, pip, cargo, go mod, etc.)",
    "Check that dependencies are declared in standard manifest files",
    "Confirm dependency resolution uses reproducible tooling",
]

[controls."OSPS-BR-06.01"]
name = "SignReleases"
description = "Sign releases or provide signed manifest containing hashes"
tags = { level = 2, domain = "BR", build = true, releases = true, security = true }

# Pattern: Check workflows or docs for signing mentions
[controls."OSPS-BR-06.01".passes.pattern]
files = [".github/workflows/*.yml", ".github/workflows/*.yaml", "SECURITY.md", "README.md"]

[controls."OSPS-BR-06.01".passes.pattern.patterns]
signing = "(GPG|Sigstore|sign|cosign|checksums?|SHA256|signature)"

[controls."OSPS-BR-06.01".passes.manual]
steps = [
    "Verify releases are cryptographically signed (GPG, Sigstore, etc.)",
    "Or verify a signed manifest with hashes is provided for release assets",
    "Check that public keys or verification instructions are documented",
]

# =============================================================================
# Level 1 Controls - Documentation (DO)
# =============================================================================

[controls."OSPS-DO-01.01"]
name = "HasReadme"
description = "Repository has a README file"
tags = { level = 1, domain = "DO", documentation = true }

[controls."OSPS-DO-01.01".locator]
project_path = "documentation.readme"
discover = ["README.md", "README.rst", "README.txt", "README", "readme.md"]
kind = "file"

[controls."OSPS-DO-01.01".passes]
deterministic = { file_must_exist = [
    "README.md",
    "README.rst",
    "README.txt",
    "README",
    "readme.md",
]}

[controls."OSPS-DO-01.01".passes.manual]
steps = [
    "Navigate to repository root directory",
    "Verify a README file exists (README.md, README.rst, or similar)",
    "Check that README contains project description and basic usage",
]

[controls."OSPS-DO-02.01"]
name = "BugReportingProcess"
description = "Document bug reporting process"
tags = { level = 1, domain = "DO", documentation = true, issues = true }

[controls."OSPS-DO-02.01".locator]
project_path = "security.policy"
discover = [".github/ISSUE_TEMPLATE/bug_report.md", ".github/ISSUE_TEMPLATE/bug_report.yml", ".github/ISSUE_TEMPLATE.md"]
kind = "file"

[controls."OSPS-DO-02.01".locator.llm_hints]
search_for = "bug report, issue template, report bugs"
check_files = ["README.md", "CONTRIBUTING.md"]
look_for_urls = false

[controls."OSPS-DO-02.01".passes.deterministic]
file_must_exist = [".github/ISSUE_TEMPLATE/bug_report.md", ".github/ISSUE_TEMPLATE/bug_report.yml", ".github/ISSUE_TEMPLATE.md"]

[controls."OSPS-DO-02.01".passes.pattern]
files = ["README.md", "CONTRIBUTING.md"]

[controls."OSPS-DO-02.01".passes.pattern.patterns]
bug_reporting = "(report|submit).*(bug|issue)"

[controls."OSPS-DO-02.01".remediation]
handler = "create_bug_report_template"  # Legacy handler for fallback
safe = true
dry_run_supported = true

# Declarative file creation remediation
[controls."OSPS-DO-02.01".remediation.file_create]
path = ".github/ISSUE_TEMPLATE/bug_report.md"
template = "bug_report_template"
overwrite = false
create_dirs = true

# =============================================================================
# Level 2 Controls - Documentation (DO)
# =============================================================================

[controls."OSPS-DO-06.01"]
name = "DependencyDocumentation"
description = "Document how project selects, obtains, and tracks dependencies"
tags = { level = 2, domain = "DO", documentation = true, dependencies = true }

[controls."OSPS-DO-06.01".locator]
project_path = "documentation.dependencies"
discover = ["docs/dependencies.md", "DEPENDENCIES.md", "docs/dependency-policy.md"]
kind = "file"

[controls."OSPS-DO-06.01".locator.llm_hints]
search_for = "dependency management, dependency policy, how we manage dependencies"
check_files = ["README.md", "CONTRIBUTING.md", "SECURITY.md"]
look_for_urls = false

[controls."OSPS-DO-06.01".passes.pattern]
files = ["README.md", "CONTRIBUTING.md", "docs/dependencies.md", "DEPENDENCIES.md"]

[controls."OSPS-DO-06.01".passes.pattern.patterns]
dependency_docs = "(dependenc|package|library).*(select|obtain|track|manage|update|policy)"

[controls."OSPS-DO-06.01".passes.manual]
steps = [
    "Verify documentation explains how dependencies are selected",
    "Check that dependency sources are documented",
    "Confirm dependency tracking/update process is described",
]

# =============================================================================
# Level 1 Controls - Governance (GV)
# =============================================================================

[controls."OSPS-GV-02.01"]
name = "PublicDiscussion"
description = "Enable public discussion mechanisms"
tags = { level = 1, domain = "GV", governance = true, community = true }

# ExecPass: Check if Issues or Discussions are enabled
[controls."OSPS-GV-02.01".passes.exec]
command = ["gh", "api", "/repos/$OWNER/$REPO", "--jq", ".has_issues or .has_discussions"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "text"
pass_if_output_matches = "^true"
timeout = 30

[controls."OSPS-GV-02.01".passes.manual]
steps = [
    "Navigate to Repository Settings → General → Features",
    "Verify 'Issues' or 'Discussions' is enabled",
]

[controls."OSPS-GV-03.01"]
name = "HasContributing"
description = "Repository has contributing guidelines"
tags = { level = 1, domain = "GV", governance = true, documentation = true }

[controls."OSPS-GV-03.01".locator]
project_path = "governance.contributing"
discover = ["CONTRIBUTING.md", ".github/CONTRIBUTING.md", "docs/CONTRIBUTING.md"]
kind = "file"

[controls."OSPS-GV-03.01".locator.llm_hints]
search_for = "contributing guidelines, contribution guide, how to contribute"
check_files = ["README.md"]
look_for_urls = false

[controls."OSPS-GV-03.01".passes]
deterministic = { file_must_exist = [
