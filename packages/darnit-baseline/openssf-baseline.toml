[controls."OSPS-GV-02.01"]
name = "PublicDiscussion"
description = "Enable public discussion mechanisms"
tags = { level = 1, domain = "GV", governance = true, community = true }
when = { platform = "github" }

# ExecPass: Check if Issues or Discussions are enabled
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-GV-02.01"
location_hint = "CONTRIBUTING.md"
help_md = """Enable public discussion channels.

**Remediation:**
1. Enable GitHub Discussions or Issues
2. Create a CONTRIBUTING.md with discussion guidelines
3. Consider adding a mailing list or chat channel
"""

[[controls."OSPS-GV-02.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO", "--jq", ".has_issues or .has_discussions"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "text"
expr = 'output.stdout.startsWith("true")'
timeout = 30

[[controls."OSPS-GV-02.01".passes]]
handler = "manual"
steps = [
    "Navigate to Repository Settings → General → Features",
    "Verify 'Issues' or 'Discussions' is enabled",
]

[controls."OSPS-GV-03.01"]
name = "HasContributing"
description = "Repository has contributing guidelines"
tags = { level = 1, domain = "GV", governance = true, documentation = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-GV-03.01"
location_hint = "CONTRIBUTING.md"
help_md = """Document the contribution process.

**Remediation:**
1. Create CONTRIBUTING.md
2. Explain how to submit changes (PRs)
3. Describe the review process
4. Include coding standards if applicable
"""

[controls."OSPS-GV-03.01".locator]
project_path = "governance.contributing"
discover = ["CONTRIBUTING.md", ".github/CONTRIBUTING.md", "docs/CONTRIBUTING.md"]
kind = "file"

[controls."OSPS-GV-03.01".locator.llm_hints]
search_for = "contributing guidelines, contribution guide, how to contribute"
check_files = ["README.md"]
look_for_urls = false

[[controls."OSPS-GV-03.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: CONTRIBUTING must describe steps and PR guidelines
[[controls."OSPS-GV-03.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pass_if_any = true

[controls."OSPS-GV-03.01".passes.pattern.patterns]
steps_with_pr = '(?si)(step|1\.|fork|clone|branch).{20,}(pull request|PR|submit|merge)'
pr_guidelines = '(?si)(pull request|PR).{0,60}(guideline|require|ensure|should|must)'
how_to_contribute = '(?si)(how to contribute|getting started|development setup).{20,}'

[[controls."OSPS-GV-03.01".passes]]
handler = "manual"
steps = [
    "Look for CONTRIBUTING.md in repository root or .github/ directory",
    "Verify it contains contribution guidelines and process",
    "Check it includes code of conduct or links to one",
]

[controls."OSPS-GV-03.01".remediation]
safe = true
dry_run_supported = true

# Declarative file creation remediation
[[controls."OSPS-GV-03.01".remediation.handlers]]
handler = "file_create"
path = "CONTRIBUTING.md"
template = "contributing_standard"
overwrite = false
create_dirs = false

# =============================================================================
# Level 1 Controls - Legal (LE)
# =============================================================================

[controls."OSPS-LE-01.01"]
name = "HasLicense"
description = "Repository has a license file"
tags = { level = 1, domain = "LE", legal = true, license = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-LE-01.01"
location_hint = "CONTRIBUTING.md"
help_md = """Implement DCO or CLA for contributions.

**Remediation:**
1. Add DCO requirement (Signed-off-by)
2. Or implement CLA bot
3. Document requirement in CONTRIBUTING.md

**DCO Sign-off:**
```
git commit -s -m "Your commit message"
```
"""

[controls."OSPS-LE-01.01".locator]
project_path = "legal.license"
discover = ["LICENSE", "LICENSE.md", "LICENSE.txt", "COPYING"]
kind = "file"

[[controls."OSPS-LE-01.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: LICENSE must contain copyright notice and license grant
[[controls."OSPS-LE-01.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pass_if_any = true

[controls."OSPS-LE-01.01".passes.pattern.patterns]
copyright_and_grant = '(?si)copyright.{0,100}(permission|license|grant|redistribu|free)'
spdx_identifier = '(?i)SPDX-License-Identifier:\s*\S+'
known_license_header = '(?i)(MIT License|Apache License|GNU General Public|BSD \d-Clause|Mozilla Public|ISC License)'

[[controls."OSPS-LE-01.01".passes]]
handler = "manual"
steps = [
    "Check repository root for LICENSE, LICENSE.md, or COPYING file",
    "Verify the license file contains valid license text",
    "Confirm license type is clearly identified",
]

[controls."OSPS-LE-01.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-LE-01.01".remediation.handlers]]
handler = "file_create"
path = "LICENSE"
template = "license_mit"
overwrite = false

[controls."OSPS-LE-01.01".remediation.project_update]
set = { "legal.license.path" = "LICENSE" }

[controls."OSPS-LE-02.01"]
name = "OSIApprovedLicense"
description = "License is OSI-approved"
tags = { level = 1, domain = "LE", legal = true, license = true }
when = { platform = "github" }

# ExecPass: Check if license is OSI-approved via GitHub's license detection
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-LE-02.01"
location_hint = "LICENSE"
help_md = """Use an OSI-approved open source license.

**Remediation:**
1. Choose an OSI-approved license (MIT, Apache-2.0, GPL, etc.)
2. Add LICENSE file to repository root
3. Include license header in source files if required

**References:**
- [OSI Approved Licenses](https://opensource.org/licenses)
"""

[[controls."OSPS-LE-02.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO", "--jq", ".license.spdx_id // \"none\""]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "text"
# Match common OSI-approved licenses (case-insensitive handled by spdx_id)
expr = 'output.stdout.matches("^(MIT|Apache-2\\.0|GPL-[23]\\.0|LGPL-[23]\\.[01]|BSD-[23]-Clause|MPL-2\\.0|ISC|Unlicense|0BSD|AGPL-3\\.0|EPL-[12]\\.0|CC0-1\\.0)\\n?$")'
timeout = 30

[[controls."OSPS-LE-02.01".passes]]
handler = "manual"
steps = [
    "Navigate to repository main page",
    "Check license badge in repository sidebar",
    "Verify license is OSI-approved at https://opensource.org/licenses",
]

[controls."OSPS-LE-02.02"]
name = "ReleaseLicense"
description = "Releases include license information"
tags = { level = 1, domain = "LE", legal = true, license = true }
when = { platform = "github" }

# Check that releases have license info (via release notes or included files)
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-LE-02.02"
location_hint = "LICENSE"
help_md = """Include OSI-approved license with releases.

**Remediation:**
1. Include LICENSE file in release assets
2. Ensure license is compatible with dependencies
3. Document license in package metadata
"""

[[controls."OSPS-LE-02.02".passes]]
handler = "exec"
command = ["gh", "release", "view", "--json", "body,assets"]
pass_exit_codes = [0]
output_format = "json"
expr = 'output.json.body != ""'
timeout = 30

[[controls."OSPS-LE-02.02".passes]]
handler = "manual"
steps = [
    "Go to repository Releases page",
    "Check that latest release mentions license or includes LICENSE file",
    "Verify release artifacts include license information",
]

[controls."OSPS-LE-03.01"]
name = "LicenseInRepo"
description = "License file present in repository root"
tags = { level = 1, domain = "LE", legal = true, license = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-LE-03.01"
location_hint = "LICENSE"
help_md = """Add license file to repository.

**Remediation:**
1. Create LICENSE or COPYING file in repository root
2. Use full license text, not abbreviation
3. GitHub will auto-detect standard licenses
"""

[controls."OSPS-LE-03.01".locator]
project_path = "legal.license"
discover = ["LICENSE", "LICENSE.md", "COPYING"]
kind = "file"

[[controls."OSPS-LE-03.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: LICENSE should contain license-related terms
[[controls."OSPS-LE-03.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pattern = '(?i)(permission|license|copyright|warranty)'
min_matches = 1

[[controls."OSPS-LE-03.01".passes]]
handler = "manual"
steps = [
    "Navigate to repository root directory",
    "Verify a LICENSE or COPYING file exists",
    "Confirm the file contains complete license text",
]

[controls."OSPS-LE-03.02"]
name = "LicenseInReleases"
description = "License file included in releases"
tags = { level = 1, domain = "LE", legal = true, license = true }
when = { has_releases = true, platform = "github" }
inferred_from = "OSPS-LE-03.01"  # If LICENSE exists in repo, GitHub auto-includes it in source archives

# Check that release assets include license file
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-LE-03.02"
location_hint = "LICENSE"
help_md = """Include license file in release artifacts.

**Remediation:**
1. Add LICENSE to release archive
2. Include license in package metadata
3. Automate license inclusion in release workflow
"""

[[controls."OSPS-LE-03.02".passes]]
handler = "exec"
command = ["gh", "release", "view", "--json", "assets"]
pass_exit_codes = [0]
output_format = "json"
expr = 'size(output.json.assets) > 0'
timeout = 30

[[controls."OSPS-LE-03.02".passes]]
handler = "manual"
steps = [
    "Go to repository Releases page",
    "Download or inspect release archive (zip/tar)",
    "Verify LICENSE file is included in the release archive",
]

# =============================================================================
# Level 1 Controls - Quality Assurance (QA)
# =============================================================================

[controls."OSPS-QA-01.01"]
name = "PublicRepository"
description = "Repository is publicly accessible"
tags = { level = 1, domain = "QA", quality = true, transparency = true }
when = { platform = "github" }

# ExecPass: Use gh CLI to check repository visibility
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-QA-01.01"
help_md = """Ensure repository is publicly accessible.

**Remediation:**
1. Set repository visibility to Public
2. Ensure URL is stable and doesn't change
3. Consider using a well-known hosting platform (GitHub, GitLab)
"""

[[controls."OSPS-QA-01.01".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO"]
pass_exit_codes = [0]
fail_exit_codes = [1]
output_format = "json"
expr = 'output.json.private == false'
timeout = 30

[[controls."OSPS-QA-01.01".passes]]
handler = "manual"
steps = [
    "Navigate to the repository URL",
    "Verify the repository is accessible without authentication",
    "Check repository settings to confirm visibility is 'Public'",
]

[controls."OSPS-QA-01.01".remediation]
safe = false
requires_api = true
dry_run_supported = false

[[controls."OSPS-QA-01.01".remediation.handlers]]
handler = "api_call"
method = "PATCH"
endpoint = "/repos/$OWNER/$REPO"
payload_template = "repo_visibility_payload"

[[controls."OSPS-QA-01.01".remediation.handlers]]
handler = "manual"
steps = [
    "Navigate to Repository Settings → General → Danger Zone",
    "Click 'Change repository visibility' and select 'Public'",
    "Note: This requires repository admin permissions and may affect billing",
]
docs_url = "https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/managing-repository-settings/setting-repository-visibility"

[controls."OSPS-QA-01.02"]
name = "PublicCommitHistory"
description = "Commit history is publicly visible"
tags = { level = 1, domain = "QA", quality = true, transparency = true }
when = { platform = "github" }

# ExecPass: Check that commit history is accessible
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-QA-01.02"
help_md = """Maintain public git history.

**Remediation:**
1. Use git for version control
2. Don't squash history excessively
3. Maintain author attribution in commits
"""

[[controls."OSPS-QA-01.02".passes]]
handler = "exec"
command = ["gh", "api", "/repos/$OWNER/$REPO/commits", "--jq", "length"]
pass_exit_codes = [0]
expr = 'output.stdout.matches("^[1-9][0-9]*")'
timeout = 30

[[controls."OSPS-QA-01.02".passes]]
handler = "manual"
steps = [
    "Navigate to repository main page",
    "Click on commit history (X commits link)",
    "Verify commit history is accessible and not hidden",
]

[controls."OSPS-QA-01.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-01.02".remediation.handlers]]
handler = "manual"
steps = [
    "Commit history visibility is controlled by repository visibility — ensure the repository is public (see OSPS-QA-01.01)",
    "If history was previously rewritten or squashed, consider force-pushing the full history (with caution)",
]

[controls."OSPS-QA-02.01"]
name = "DependencyManifest"
description = "Project has dependency manifest files"
tags = { level = 1, domain = "QA", quality = true, dependencies = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-QA-02.01"
location_hint = "package.json"
help_md = """Maintain dependency list in repository.

**Remediation:**
1. Use package.json (Node), requirements.txt (Python), go.mod (Go), etc.
2. Keep dependencies up to date
3. Consider using lockfiles for reproducibility
"""

[controls."OSPS-QA-02.01".locator]
project_path = "dependencies.manifest"
discover = [
    "package.json", "requirements.txt", "pyproject.toml",
    "Cargo.toml", "go.mod", "pom.xml", "build.gradle", "Gemfile",
]
kind = "file"

[[controls."OSPS-QA-02.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: dependency manifest should contain dependency declarations
[[controls."OSPS-QA-02.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pattern = '(?i)(depend|require|"name"|"version"|\[project\])'
min_matches = 1

[[controls."OSPS-QA-02.01".passes]]
handler = "manual"
steps = [
    "Check for dependency manifest file (package.json, requirements.txt, etc.)",
    "Verify dependencies are declared with version constraints",
    "Confirm manifest is appropriate for the project's primary language",
]

[controls."OSPS-QA-02.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-02.01".remediation.handlers]]
handler = "manual"
steps = [
    "Create a dependency manifest file appropriate for your language/ecosystem",
    "For Python: pyproject.toml or requirements.txt; for Node: package.json; for Go: go.mod; for Rust: Cargo.toml",
    "List all direct dependencies with version constraints",
]

[controls."OSPS-QA-04.01"]
name = "DocumentSubprojects"
description = "Subprojects are documented"
tags = { level = 1, domain = "QA", quality = true, documentation = true }
when = { has_subprojects = true }

# Pattern: Look for subproject/module documentation
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-QA-04.01"
location_hint = "README.md"
help_md = """Document subprojects and dependencies.

**Remediation:**
1. List subprojects in README or documentation
2. For monorepos, document each package
3. Explain relationships between components
"""

[[controls."OSPS-QA-04.01".passes]]
handler = "pattern"
files = ["README.md", "docs/**/*.md"]

[controls."OSPS-QA-04.01".passes.pattern.patterns]
subprojects = "(subproject|module|package|workspace|monorepo)"

[[controls."OSPS-QA-04.01".passes]]
handler = "manual"
steps = [
    "Check if project has subprojects or is a monorepo",
    "If yes, verify each subproject is documented",
    "If no subprojects, mark as N/A",
]

[controls."OSPS-QA-04.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-04.01".remediation.handlers]]
handler = "manual"
steps = [
    "Add a 'Subprojects' or 'Packages' section to README.md listing all subprojects",
    "For each subproject, include a brief description and link to its own README or docs",
    "For monorepos, consider a top-level directory listing with purpose descriptions",
]
context_hints = ["has_subprojects"]

[controls."OSPS-QA-05.01"]
name = "NoGeneratedExecutables"
description = "No generated executables in repository"
tags = { level = 1, domain = "QA", quality = true, security = true }

# Pattern: Check for absence of executable extensions in tracked files
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-QA-05.01"
location_hint = ".gitignore"
help_md = """Remove generated executables from repository.

**Remediation:**
1. Add build outputs to .gitignore
2. Remove existing binaries from git history
3. Use releases for distributing binaries
"""

[[controls."OSPS-QA-05.01".passes]]
handler = "pattern"
exclude_files = ["**/*.exe", "**/*.dll", "**/*.so", "**/*.dylib", "**/*.bin"]
expr = 'output.files_found == 0'

[[controls."OSPS-QA-05.01".passes]]
handler = "manual"
steps = [
    "Search repository for executable files (.exe, .dll, .so, .dylib)",
    "Verify no generated executables are committed",
    "Check .gitignore excludes build output directories",
]

[controls."OSPS-QA-05.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-05.01".remediation.handlers]]
handler = "manual"
steps = [
    "Run 'git ls-files' and filter for executable extensions (.exe, .dll, .so, .dylib, .bin)",
    "Remove any found executables with 'git rm <file>' and commit",
    "Add executable patterns to .gitignore: *.exe, *.dll, *.so, *.dylib, *.bin",
    "Add build output directories to .gitignore (e.g., build/, dist/, target/)",
]

[controls."OSPS-QA-05.02"]
name = "NoUnreviewableBinaries"
description = "No unreviewable binary artifacts"
tags = { level = 1, domain = "QA", quality = true, security = true }

# Pattern: Check for absence of large binary files
docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-QA-05.02"
location_hint = ".gitignore"
help_md = """Remove unreviewable binary files from repository.

**Remediation:**
1. Add binary patterns to .gitignore
2. Use Git LFS for necessary large files
3. Document any required binaries
"""

[[controls."OSPS-QA-05.02".passes]]
handler = "pattern"
exclude_files = ["**/*.jar", "**/*.war", "**/*.pyc", "**/*.class", "**/*.o"]
expr = 'output.files_found == 0'

[[controls."OSPS-QA-05.02".passes]]
handler = "manual"
steps = [
    "Search repository for binary artifacts (.jar, .war, .pyc, .class)",
    "Verify no unreviewable binaries are committed",
    "Check that build artifacts are in .gitignore",
]

[controls."OSPS-QA-05.02".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-QA-05.02".remediation.handlers]]
handler = "manual"
steps = [
    "Run 'git ls-files' and filter for binary extensions (.jar, .war, .pyc, .class, .o)",
    "Remove any found binaries with 'git rm <file>' and commit",
    "Add binary patterns to .gitignore: *.jar, *.war, *.pyc, *.class, *.o",
    "Consider using Git LFS for legitimate large binary files that must be tracked",
]

# =============================================================================
# Level 1 Controls - Vulnerability Management (VM)
# =============================================================================

[controls."OSPS-VM-02.01"]
name = "HasSecurityPolicy"
description = "Repository has a security policy"
tags = { level = 1, domain = "VM", security_severity = 7.0, security = true, vulnerability-management = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-VM-02.01"
location_hint = "SECURITY.md"
help_md = """Add security contacts to SECURITY.md.

**Remediation:**
1. Create SECURITY.md in repository root
2. Include email or contact method
3. Consider using GitHub Security Advisories
"""

[controls."OSPS-VM-02.01".locator]
project_path = "security.policy"
discover = ["SECURITY.md", ".github/SECURITY.md", "docs/SECURITY.md"]
kind = "file"

[controls."OSPS-VM-02.01".locator.llm_hints]
search_for = "security policy, vulnerability reporting, security contact"
check_files = ["README.md"]
look_for_urls = true

[[controls."OSPS-VM-02.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: SECURITY.md must describe a reporting process
[[controls."OSPS-VM-02.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pass_if_any = true

[controls."OSPS-VM-02.01".passes.pattern.patterns]
reporting_process = '(?si)(how to report|reporting a vulnerability|report.*vulnerabilit).{20,}'
contact_method = '(?i)(email|security@|advisories|security tab|report a vulnerability)'
response_timeline = '(?i)(response|timeline|hours|days|business days|within \d+)'

# AI evaluation: are the reporting instructions actionable?
[[controls."OSPS-VM-02.01".passes]]
handler = "llm_eval"
prompt = """Evaluate whether this security policy provides actionable vulnerability reporting instructions:
1. Is there a clear method to report vulnerabilities (email, advisory, form)?
2. Does it describe what information to include in a report?
3. Does it mention an expected response timeline?
A policy with only TODO placeholders or just the word 'security' MUST fail."""
files_to_include = ["$FOUND_FILE"]
confidence_threshold = 0.7
analysis_hints = [
    "Look for a concrete contact method, not just 'contact us'",
    "Check for a response timeline commitment",
    "TODO placeholders indicate incomplete content",
]

[[controls."OSPS-VM-02.01".passes]]
handler = "manual"
steps = [
    "Look for SECURITY.md in repository root or .github/ directory",
    "Verify it contains vulnerability reporting instructions",
    "Check for security contact or email address",
]

[controls."OSPS-VM-02.01".remediation]
safe = true
dry_run_supported = true

# Declarative file creation remediation
[[controls."OSPS-VM-02.01".remediation.handlers]]
handler = "file_create"
path = "SECURITY.md"
template = "security_policy_standard"
overwrite = false
create_dirs = false
llm_enhance = "Customize this security policy: replace the placeholder email with the project's actual security contact, update supported versions to match real release versions, and adjust the response timeline to match the team's capacity."

# =============================================================================
# Level 2 Controls - Access Control (AC)
# =============================================================================

[controls."OSPS-AC-04.01"]
name = "ExplicitWorkflowPermissions"
description = "Workflows define explicit permissions"
tags = { level = 2, domain = "AC", security_severity = 6.5, access-control = true, ci-cd = true }
when = { ci_provider = "github" }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-AC-04.01"
location_hint = ".github/workflows"
help_md = """Configure workflows with explicit minimal permissions.

**Remediation:**
1. Add `permissions: {}` at workflow level for read-only default
2. Only grant specific permissions where needed
3. Use `permissions: read-all` for read-only jobs

**Example:**
```yaml
permissions:
  contents: read
  pull-requests: write
```
"""

[[controls."OSPS-AC-04.01".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml"]
pass_if_any = false

[controls."OSPS-AC-04.01".passes.pattern.patterns]
permissions = "^permissions:"

[[controls."OSPS-AC-04.01".passes]]
handler = "manual"
steps = [
    "Open each workflow file in .github/workflows/",
    "Verify 'permissions:' block is defined at workflow or job level",
    "Check permissions follow least-privilege principle",
]

[controls."OSPS-AC-04.01".remediation]
safe = false
dry_run_supported = false

[[controls."OSPS-AC-04.01".remediation.handlers]]
handler = "manual"
steps = [
    "Add a top-level 'permissions: {}' block to each workflow in .github/workflows/",
    "Grant only the specific permissions each job needs (e.g., contents: read)",
    "See GitHub's documentation for available permission scopes",
]
docs_url = "https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs"
context_hints = ["ci.provider"]

# =============================================================================
# Level 2 Controls - Governance (GV)
# =============================================================================

[controls."OSPS-GV-01.01"]
name = "HasGovernance"
description = "Project has governance documentation"
tags = { level = 2, domain = "GV", governance = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-GV-01.01"
location_hint = "MAINTAINERS.md"
help_md = """Document members with elevated access.

**Remediation:**
1. Create MAINTAINERS.md or GOVERNANCE.md
2. List maintainers and their roles
3. Use CODEOWNERS for code review assignments
"""

[controls."OSPS-GV-01.01".locator]
project_path = "governance.governance_doc"
discover = ["GOVERNANCE.md", "MAINTAINERS.md", "CODEOWNERS", ".github/CODEOWNERS"]
kind = "file"

[controls."OSPS-GV-01.01".locator.llm_hints]
search_for = "governance, maintainers, project leadership, decision making"
check_files = ["README.md", "CONTRIBUTING.md"]
look_for_urls = false

[[controls."OSPS-GV-01.01".passes]]
handler = "file_exists"
use_locator = true

# Content validation: governance doc must identify people and decision processes
[[controls."OSPS-GV-01.01".passes]]
handler = "regex"
file = "$FOUND_FILE"
pass_if_any = true

[controls."OSPS-GV-01.01".passes.pattern.patterns]
named_maintainer = '(?i)(maintainer|owner|lead|steward).{0,60}(@\w+|\w+\s+\w+)'
decision_process = '(?si)(decision|consensus|vote|approval|merge).{0,80}(process|policy|require|must|shall)'
codeowners_syntax = '^\S+\s+@\S+'

# AI evaluation: does the governance doc describe real governance?
[[controls."OSPS-GV-01.01".passes]]
handler = "llm_eval"
prompt = """Evaluate whether this governance document describes real project governance:
1. Does it identify specific people or teams with maintainer/leadership roles?
2. Does it describe how decisions are made (merge policy, consensus, voting)?
3. Is this substantive governance documentation, not just boilerplate?
A file with only TODO placeholders or generic text without named roles MUST fail."""
files_to_include = ["$FOUND_FILE"]
confidence_threshold = 0.7
analysis_hints = [
    "Look for named maintainers or team references (@username, name)",
    "Check for decision-making process description",
    "CODEOWNERS with path-to-owner mappings counts as governance",
    "TODO placeholders indicate incomplete content",
]

[[controls."OSPS-GV-01.01".passes]]
handler = "manual"
steps = [
    "Check for GOVERNANCE.md, MAINTAINERS.md, or CODEOWNERS file",
    "Verify governance document describes project leadership",
    "Confirm decision-making processes are documented",
]

[controls."OSPS-GV-01.01".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-GV-01.01".remediation.handlers]]
handler = "file_create"
path = "GOVERNANCE.md"
template = "governance_template"
overwrite = false
llm_enhance = "Customize this governance document: replace placeholder maintainer names with actual project maintainers, describe the real decision-making process used by the project, and adjust roles to match the project's actual governance structure."

# Context requirements - orchestrator checks these before running remediation
[[controls."OSPS-GV-01.01".remediation.requires_context]]
key = "maintainers"
required = true
confidence_threshold = 0.9
prompt_if_auto_detected = true
warning = "GitHub collaborators are not necessarily project maintainers. Please confirm the actual project maintainers."

[controls."OSPS-GV-01.02"]
name = "DocumentedRoles"
description = "Roles and responsibilities are documented"
tags = { level = 2, domain = "GV", governance = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-GV-01.02"
location_hint = "GOVERNANCE.md"
help_md = """Document roles and responsibilities.

**Remediation:**
1. Add roles section to GOVERNANCE.md
2. Define maintainer vs committer vs contributor
3. Explain decision-making process
"""

[[controls."OSPS-GV-01.02".passes]]
handler = "pattern"
files = ["GOVERNANCE.md", "MAINTAINERS.md", "CONTRIBUTING.md"]

[controls."OSPS-GV-01.02".passes.pattern.patterns]
roles = "(maintainer|contributor|reviewer|owner)"
responsibilities = "(responsibil|duties|role)"

[[controls."OSPS-GV-01.02".passes]]
handler = "manual"
steps = [
    "Check GOVERNANCE.md, MAINTAINERS.md, or CONTRIBUTING.md",
    "Verify roles (maintainer, contributor, reviewer) are defined",
    "Confirm responsibilities for each role are documented",
]

[controls."OSPS-GV-01.02".remediation]
safe = true
dry_run_supported = true

[[controls."OSPS-GV-01.02".remediation.handlers]]
handler = "file_create"
path = "MAINTAINERS.md"
template = "maintainers_template"
overwrite = false

[[controls."OSPS-GV-01.02".remediation.requires_context]]
key = "maintainers"
required = true
confidence_threshold = 0.9
prompt_if_auto_detected = true
warning = "GitHub collaborators are not necessarily project maintainers. Please confirm the actual project maintainers."

[controls."OSPS-GV-03.02"]
name = "ContributionRequirements"
description = "Contribution requirements are documented"
tags = { level = 2, domain = "GV", governance = true, contributing = true }

docs_url = "https://baseline.openssf.org/versions/2025-10-10#OSPS-GV-03.02"
location_hint = "CONTRIBUTING.md"
