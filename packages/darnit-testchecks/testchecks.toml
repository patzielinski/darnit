# Test Checks Framework Definition
# A simple framework for testing the declarative configuration system
#
# This framework defines trivial checks that are easy to pass/fail
# for testing purposes.

[metadata]
name = "testchecks"
display_name = "Test Checks Framework"
version = "0.1.0"
schema_version = "0.1.0-alpha"  # TOML config format version - expect breaking changes
spec_version = "test-v1"
description = "Trivial checks for testing the darnit declarative configuration system"
url = "https://github.com/kusaridev/baseline-mcp"

[defaults]
check_adapter = "builtin"
remediation_adapter = "builtin"

# =============================================================================
# Adapter Definitions
# =============================================================================

[adapters.builtin]
type = "python"
module = "darnit_testchecks.adapters.builtin"
class = "TestCheckAdapter"

# =============================================================================
# Level 1 Controls - Basic Project Setup
# =============================================================================

[controls."TEST-DOC-01"]
name = "HasReadme"
level = 1
domain = "DOC"
description = "Repository must have a README file"
tags = ["documentation", "basic"]

[[controls."TEST-DOC-01".passes]]
handler = "file_exists"
files = [
    "README.md",
    "README.rst",
    "README.txt",
    "README",
]

[controls."TEST-DOC-01".remediation]
handler = "create_readme"
safe = true

[controls."TEST-DOC-02"]
name = "HasChangelog"
level = 1
domain = "DOC"
description = "Repository should have a CHANGELOG file"
tags = ["documentation", "releases"]

[[controls."TEST-DOC-02".passes]]
handler = "file_exists"
files = [
    "CHANGELOG.md",
    "CHANGELOG.txt",
    "CHANGELOG",
    "HISTORY.md",
    "CHANGES.md",
]

[controls."TEST-LIC-01"]
name = "HasLicense"
level = 1
domain = "LIC"
description = "Repository must have a LICENSE file"
tags = ["legal", "license"]

[[controls."TEST-LIC-01".passes]]
handler = "file_exists"
files = [
    "LICENSE",
    "LICENSE.md",
    "LICENSE.txt",
    "COPYING",
]

[controls."TEST-IGN-01"]
name = "HasGitignore"
level = 1
domain = "CFG"
description = "Repository should have a .gitignore file"
tags = ["configuration", "git"]

[[controls."TEST-IGN-01".passes]]
handler = "file_exists"
files = [".gitignore"]

[controls."TEST-IGN-01".remediation]
handler = "create_gitignore"
safe = true

# =============================================================================
# Level 2 Controls - Code Quality
# =============================================================================

[controls."TEST-QA-01"]
name = "NoTodoComments"
level = 2
domain = "QA"
description = "Code should not contain TODO comments (for testing - intentionally strict)"
tags = ["quality", "code-review"]

[[controls."TEST-QA-01".passes]]
handler = "pattern"
files = ["**/*.py", "**/*.js", "**/*.ts"]
pass_if_any = false

[controls."TEST-QA-01".passes.pattern.patterns]
todo_comment = "#\\s*TODO|//\\s*TODO|/\\*\\s*TODO"

[controls."TEST-QA-02"]
name = "NoPrintStatements"
level = 2
domain = "QA"
description = "Python code should not contain print() statements (use logging)"
tags = ["quality", "python"]

[[controls."TEST-QA-02".passes]]
handler = "pattern"
files = ["**/*.py"]
pass_if_any = false

[controls."TEST-QA-02".passes.pattern.patterns]
print_statement = "^\\s*print\\s*\\("

[controls."TEST-CFG-01"]
name = "HasEditorConfig"
level = 2
domain = "CFG"
description = "Repository should have an .editorconfig file"
tags = ["configuration", "editor"]

[[controls."TEST-CFG-01".passes]]
handler = "file_exists"
files = [".editorconfig"]

[controls."TEST-CFG-02"]
name = "HasPreCommitConfig"
level = 2
domain = "CFG"
description = "Repository should have pre-commit configuration"
tags = ["configuration", "hooks"]

[[controls."TEST-CFG-02".passes]]
handler = "file_exists"
files = [
    ".pre-commit-config.yaml",
    ".pre-commit-config.yml",
]

# =============================================================================
# Level 3 Controls - Advanced
# =============================================================================

[controls."TEST-SEC-01"]
name = "NoHardcodedPasswords"
level = 3
domain = "SEC"
description = "Code should not contain hardcoded passwords"
tags = ["security", "secrets"]

[[controls."TEST-SEC-01".passes]]
handler = "pattern"
files = ["**/*.py", "**/*.js", "**/*.ts", "**/*.yaml", "**/*.yml", "**/*.json"]
pass_if_any = false

[controls."TEST-SEC-01".passes.pattern.patterns]
password_assignment = "password\\s*=\\s*[\"'][^\"']+[\"']"
secret_assignment = "secret\\s*=\\s*[\"'][^\"']+[\"']"
api_key_assignment = "api_key\\s*=\\s*[\"'][^\"']+[\"']"

[controls."TEST-SEC-02"]
name = "GitignoreSecrets"
level = 3
domain = "SEC"
description = ".gitignore should exclude common secret files"
tags = ["security", "secrets", "git"]

[[controls."TEST-SEC-02".passes]]
handler = "pattern"
files = [".gitignore"]

[controls."TEST-SEC-02".passes.pattern.patterns]
env_files = "\\.env"
key_files = "\\*.key|\\*.pem"
credential_files = "credentials|secrets"

[controls."TEST-CI-01"]
name = "HasCIConfig"
level = 3
domain = "CI"
description = "Repository should have CI/CD configuration"
tags = ["ci-cd", "automation"]

[[controls."TEST-CI-01".passes]]
handler = "file_exists"
files = [
    ".github/workflows/*.yml",
    ".github/workflows/*.yaml",
    ".gitlab-ci.yml",
    ".circleci/config.yml",
    "Jenkinsfile",
    ".travis.yml",
    "azure-pipelines.yml",
]

[controls."TEST-CI-02"]
name = "CIRunsTests"
level = 3
domain = "CI"
description = "CI configuration should run tests"
tags = ["ci-cd", "testing"]

[[controls."TEST-CI-02".passes]]
handler = "pattern"
files = [".github/workflows/*.yml", ".github/workflows/*.yaml", ".gitlab-ci.yml"]

[controls."TEST-CI-02".passes.pattern.patterns]
test_command = "(npm test|pytest|go test|cargo test|mvn test|make test)"
